version: 0.2.0
name: artemis
package: pga-workbench

mission:
  type: power_gas_analytics_agent
  description: Local, model-agnostic Power + Gas analytics and self-development agent.

authority:
  root_contract: AGENTS.md
  deterministic_core:
    - src/pga_workbench/
    - tests/
    - schemas/
    - registries/
  canonical_domain:
    - domain/
    - docs/CONVENTIONS_LOCKED_v0.1.md
  change_policy: development/CHANGE_POLICY.md

modes:
  analyst:
    description: Conversational analytics, views, dashboards, reports, and explanations.
    can_modify_repo: false
    can_write_workspace_outputs: true
    can_update_canonical_kb: false
    default_tools:
      - parse_period
      - analyst_view_build
      - data_source_list
  development:
    description: Self-improvement paired with a coding backend or human developer.
    can_modify_repo: true
    requires_ticket: true
    requires_validation: true
    default_tools:
      - dev_context
      - validate_repo
      - release_check

context:
  max_file_bytes: 200000
  profiles:
    default:
      description: Standard development context for repo workflow changes.
      files: []
    wrapper:
      description: Context for agent harness, prompt, wrapper, and validation cleanup.
      files:
        - opencode.jsonc
        - .opencode/commands/artemis-context.md
        - .opencode/commands/artemis-review-ticket.md
        - .opencode/commands/artemis-validate.md
        - .opencode/agents/build.md
        - .opencode/agents/development-improvement.md
        - .opencode/agents/kb-skill-curator.md
        - .opencode/agents/plan.md
        - .opencode/agents/qa-reconciliation.md
        - .opencode/agents/release-manager.md
        - .opencode/agents/release.md
        - .opencode/agents/review.md
        - registries/tools.yaml
        - registries/tool_permissions.yaml
        - src/pga_workbench/validation/runner.py
        - src/pga_workbench/agent_runtime/release_workflow.py
    trading_domain:
      description: Context for convention-sensitive trading analytics behavior.
      files:
        - docs/CONVENTIONS_LOCKED_v0.1.md
        - domain/source_policy.md
        - domain/market_index_model.md
        - domain/power_basis_conventions.md
        - domain/gas_index_families.md
        - domain/period_grammar.md
        - domain/units_and_quantities.md
        - registries/
        - schemas/
        - tests/
    behavioral:
      description: Context for parser, normalization, valuation, and source semantics changes.
      files:
        - docs/CONVENTIONS_LOCKED_v0.1.md
        - development/CHANGE_POLICY.md
        - domain/
        - registries/
        - schemas/
        - tests/

roles:
  analyst_llm:
    required: false
    accepted_provider_kinds:
      - openai_compatible
      - external_harness
      - none
  coding_backend:
    required: false
    accepted_backend_kinds:
      - external_harness
      - human
  chart_renderer:
    required: false
    accepted_renderer_kinds:
      - tui
      - browser
      - static_html
      - markdown
      - json

providers:
  default_profile: deterministic_only
  profiles:
    deterministic_only:
      kind: deterministic_only
      required: false
      descriptor: integrations/providers/deterministic_only.yaml
    # Optional non-authoritative convenience profile. The descriptor, not this
    # profile, defines provider binding shape; deterministic commands must not
    # require this runtime.
    local_ollama:
      kind: openai_compatible
      required: false
      descriptor: integrations/providers/openai_compatible.example.yaml
      base_url: http://localhost:11434/v1
      model: qwen3-coder:30b
      api_key_env: OLLAMA_API_KEY

runtime:
  env_files:
    - .env
    - local/.env

file_sources:
  marks_root_env: ARTEMIS_MARKS_ROOT
  positions_root_env: ARTEMIS_POSITIONS_ROOT
  trades_root_env: ARTEMIS_TRADES_ROOT
  internal_db_root_env: ARTEMIS_INTERNAL_DB_ROOT

orchestrators:
  openclaw:
    descriptor: integrations/orchestrators/openclaw.yaml
    required: false

backends:
  coding:
    default: human
    options:
      human:
        descriptor: integrations/coding_backends/human.yaml
      opencode:
        descriptor: integrations/coding_backends/opencode.yaml
      external_harness:
        descriptor: integrations/coding_backends/external_harness.example.yaml

tools:
  registry: registries/tools.yaml
  permissions: registries/tool_permissions.yaml

knowledge:
  manifest: knowledge_base/MANIFEST.yaml
  validation_schema: schemas/knowledge_base_entry.schema.json

skills:
  manifest: skills/manifest.yaml
  procedural_manifest: skills/procedural_manifest.yaml
  validation_schema: schemas/skill.schema.json

views:
  manifest: views/manifest.yaml
  validation_schema: schemas/view.schema.json

data_sources:
  registry: registries/data_sources.yaml
  validation_schema: schemas/data_source.schema.json

policies:
  cache: configs/cache_policy.yaml
  forecast_retention: configs/forecast_retention_policy.yaml
  source: configs/source_policy.yaml
  risk: configs/risk_policy.yaml

release:
  validation_commands:
    - artemis validate --strict
