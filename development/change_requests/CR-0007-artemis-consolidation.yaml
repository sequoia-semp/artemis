change_id: CR-0007
title: Consolidate Artemis architecture and runtime context
created_at: 2026-06-04T00:00:00Z
change_class: 7
severity: medium
tickets:
  - T-0019
problem_statement: >
  Artemis 0.2.0 introduced the new product identity, config, modes, manifests,
  and CLI surface, but primary navigation and runtime context still point through
  legacy build-packet and local LLM scaffolding. This creates competing entry
  points for humans and agents.
root_cause: >
  The initial Artemis architecture pass was additive. It preserved old context,
  wrapper, and validation paths for compatibility before consolidating them under
  artemis.yaml.
affected_files:
  - README.md
  - AGENTS.md
  - llms.txt
  - docs/README.md
  - CODEX_IMPLEMENTATION_BRIEF.md
  - NEXT_AGENT_START_HERE.md
  - local/llm_config.example.yaml
  - local/artemis.local.example.yaml
  - Makefile
  - integrations/
  - artemis.yaml
  - src/pga_workbench/agent_runtime/context_loader.py
  - src/pga_workbench/dev/patch_context.py
  - src/pga_workbench/dev/release.py
  - src/pga_workbench/agent_runtime/release_workflow.py
  - src/pga_workbench/cli.py
  - tests/
tests_required:
  - python -m pytest -q
  - make validate
  - artemis config validate
  - artemis capabilities
  - artemis skill validate
  - artemis views validate
  - artemis data-sources validate
  - artemis dev context --ticket T-0018 --output /tmp/T-0018_context.json
approval:
  status: approved
  approved_by: user_request
  approved_at: 2026-06-04T00:00:00Z
rollback_plan: >
  Restore the prior README/AGENTS/llms/local config/context-loader paths,
  remove Makefile Artemis validation targets and descriptor normalization tests,
  and revert release-candidate hardening if the consolidation blocks existing
  package commands.
