change_id: CR-0008
title: Foundation architecture cleanup and root contract hardening
created_at: 2026-06-04T00:00:00Z
change_class: 7
severity: medium
tickets:
  - T-0020
problem_statement: >
  Artemis has a consolidated control plane, but root/product entrypoints still
  expose legacy planning files, wrapper configuration, and individual market
  convention math. This weakens the workflow-traced architecture contract.
root_cause: >
  Earlier cleanup preserved compatibility files in primary locations. The root
  entrypoint layer needs a stricter allowlist and legacy artifacts need archive
  or descriptor locations.
