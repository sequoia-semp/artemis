change_id: CR-0012
title: ICE gas contract to gas index mapping semantics
created_at: 2026-06-05T00:00:00Z
change_class: 6
severity: medium
tickets:
  - T-0024
problem_statement: >
  Artemis needs the ICE contract-to-index demo to cover listed natural gas
  contracts and gas basis/index formulas, not only PJM power forwards, while
  preserving published index and formula semantics across the initial Henry,
  TETCO, Transco, and Eastern Gas South grid.
root_cause: >
  The initial exchange contract mapping schemas were power-oriented and required
  PJM pnode/market-run fields. Gas contracts require published index families
  and explicit settlement formula legs such as Inside FERC minus Henry LD1 or
  average Gas Daily minus Inside FERC.
affected_files:
  - domain/forward_fundamental_mapping.md
  - domain/gas_index_families.md
  - docs/OFFICIAL_SOURCE_REGISTER.md
  - registries/exchange_contracts.yaml
  - registries/forward_fundamental_mappings.yaml
  - registries/gas_locations.yaml
  - registries/product_master.yaml
  - schemas/exchange_contract.schema.json
  - schemas/forward_fundamental_mapping.schema.json
  - tests/test_forward_fundamental_mapping.py
  - work/tickets/T-0024-ice-gas-contract-index-mapping.yaml
tests_required:
  - .venv/bin/python -m pytest tests/test_forward_fundamental_mapping.py tests/test_registry_driven_normalization.py tests/test_indices.py -q
  - make validate
approval:
  status: approved
  approved_by: user_request
  approved_at: 2026-06-05T00:00:00Z
rollback_plan: >
  Remove the ICE gas contract records, gas mapping records, gas-location status
  updates, product-master gas contract references, and gas schema extensions; restore
  forward_fundamental_mapping.schema.json and exchange_contract.schema.json to
  the power-only contract mapping shape.
