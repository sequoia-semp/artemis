change_id: CR-0020
title: Context-control and agent-harness cleanup sprint
created_at: 2026-06-05T00:00:00Z
change_class: 7
severity: high
tickets:
  - T-context-tool-integrity
  - T-wrapper-shim-cleanup
  - T-context-audit
  - T-validation-release-consolidation
  - T-context-profiles
  - T-skill-surface-validation
  - T-tool-spec-v2
problem_statement: >
  Active prompt, tool, context, validation, and skill surfaces could drift from
  Artemis deterministic authority. Missing default tools, legacy wrapper
  context commands, hard-coded validation lists, unmanifested markdown skills,
  and command-only ToolSpec records made it possible for agent harness behavior
  to contradict the core rule that prompt-only analytics are not authoritative.
root_cause: >
  Prior Artemis consolidation added native commands while preserving compatibility
  wrappers and older prompt records. Cross-surface validation did not yet enforce
  registry/config consistency, active wrapper shims, context profiles, procedural
  skill authority, or richer tool authority metadata.
