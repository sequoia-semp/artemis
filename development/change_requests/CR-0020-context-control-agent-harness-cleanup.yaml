rollback_plan: >
  Revert CR-0020 changes together: restore the previous artemis.yaml release
  commands and mode defaults, previous command-only tool schema/registry,
  previous wrapper prompts, previous skill validation behavior, and remove the
  context audit check from strict validation. Keep existing native validation and
  release-readiness gates from earlier CRs intact.
