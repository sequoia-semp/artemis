change_id: CR-0021
title: Fundamental metric registry and schema
created_at: 2026-06-05T00:00:00Z
change_class: 4
severity: medium
tickets:
  - T-0040
problem_statement: >
  PJM fundamentals work needs a schema-backed metric registry before ingestion,
  live APIs, computed views, or forecast-retention products are introduced.
root_cause: >
  Existing source and view contracts can describe fundamentals as a broad data
  source, but there is no typed registry for actual, forecast, and derived
  metric identities that future adapters and services can validate against.
affected_files:
  - registries/fundamental_metrics.yaml
  - schemas/fundamental_metric.schema.json
  - src/pga_workbench/registry.py
  - tests/test_fundamentals_registries.py
  - work/tickets/T-0040-fundamental-metric-registry-and-schema.yaml
tests_required:
  - .venv/bin/python -m pytest tests/test_fundamentals_registries.py -q
  - .venv/bin/artemis validate --strict --ticket T-0040
approval:
  status: approved
  approved_by: user_request
  approved_at: 2026-06-05T00:00:00Z
rollback_plan: >
  Remove fundamental_metrics.yaml, fundamental_metric.schema.json, the registry
  validation handler, and the T-0040 regression tests. No adapter, cache, API,
  or computed-view behavior needs rollback because this change only adds typed
  metric registry metadata.
