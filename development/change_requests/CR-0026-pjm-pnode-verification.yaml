  - registries/forward_fundamental_mappings.yaml
  - schemas/forward_fundamental_mapping.schema.json
  - tests/fixtures/pjm_pnodes_wh_ad_ni.json
  - tests/test_power_system_price_core.py
  - tests/test_forward_fundamental_mapping.py
tests_required:
  - .venv/bin/pytest tests/test_power_system_price_core.py tests/test_forward_fundamental_mapping.py
  - .venv/bin/pytest
  - .venv/bin/artemis validate --strict --ticket T-0045
approval:
  status: approved
  approved_by: user_request
  approved_at: 2026-06-06T00:00:00Z
rollback_plan: >
  Restore prior pnode_source_status and forward mapping verification_status
