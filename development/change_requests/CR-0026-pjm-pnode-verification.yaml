change_id: CR-0026
title: PJM pnode fixture verification for approved power hubs
created_at: 2026-06-06T00:00:00Z
change_class: 6
severity: high
tickets:
  - T-0045
problem_statement: >
  WH, AD, and NI power locations and forward-to-fundamental LMP mappings carried
  pnode IDs that were user-approved or public-example-backed pending committed
  PJM Data Miner evidence.
