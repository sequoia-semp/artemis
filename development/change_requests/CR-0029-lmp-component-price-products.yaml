change_id: CR-0029
title: First-class PJM hourly LMP component source price products
created_at: 2026-06-06T00:00:00Z
change_class: 6
severity: high
tickets:
  - T-0048
problem_statement: >
  PJM hourly LMP normalization preserved congestion, marginal loss, and system
  energy values only inside full-LMP lineage, preventing direct source-backed
  component price surfaces from being consumed by power-system analytics.
root_cause: >
  The first PJM price source pass intentionally limited canonical price surface
  output to FULL_LMP while storing source component values as audit metadata.
affected_files:
  - domain/power_system_prices.md
  - registries/power_system_price_feeds.yaml
  - schemas/power_system_price_feed.schema.json
  - src/pga_workbench/services/power_prices.py
  - src/pga_workbench/services/power_price_shapes.py
  - tests/test_power_system_price_core.py
  - tests/test_power_price_shape_rollups.py
tests_required:
  - .venv/bin/pytest tests/test_power_system_price_core.py tests/test_power_price_shape_rollups.py
  - .venv/bin/pytest
  - .venv/bin/artemis validate --strict --ticket T-0048
approval:
  status: approved
  approved_by: user_request
  approved_at: 2026-06-06T00:00:00Z
rollback_plan: >
  Revert supported price components to FULL_LMP only, remove component point
  emission and missing-component failures, and restore daily shape rollups to
  the prior full-LMP-only input assumptions.
