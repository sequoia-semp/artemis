change_id: CR-0030
title: Bounded PJM hourly LMP source query planning
created_at: 2026-06-06T00:00:00Z
change_class: 6
severity: high
tickets:
  - T-0049
problem_statement: >
  Live PJM hourly LMP fetches were bounded at the connector level but still
  constructed one feed request over the full requested date range, leaving
  archive-aware date chunking and total planned-request budgeting implicit.
root_cause: >
  Source access guardrails were implemented before a reusable power-system query
  planning layer existed for feed-family-specific date windows and request-count
  budgets.
affected_files:
  - registries/power_system_source_query_plans.yaml
  - schemas/power_system_source_query_plan.schema.json
  - src/pga_workbench/registry.py
  - src/pga_workbench/cli.py
  - src/pga_workbench/services/source_query_plans.py
  - tests/test_source_query_plans.py
  - tests/test_power_system_price_core.py
tests_required:
  - .venv/bin/pytest tests/test_source_query_plans.py tests/test_power_system_price_core.py
  - .venv/bin/pytest
  - .venv/bin/artemis validate --strict --ticket T-0049
approval:
  status: approved
  approved_by: user_request
  approved_at: 2026-06-06T00:00:00Z
rollback_plan: >
  Remove the source query plan registry/schema/helper and revert live PJM hourly
  LMP fetches to single date-range requests guarded only by connector-level
  pagination limits.
