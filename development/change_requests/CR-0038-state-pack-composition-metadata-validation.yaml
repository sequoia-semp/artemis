change_id: CR-0038
title: State-pack composition metadata validation
created_at: 2026-06-06T00:00:00Z
change_class: 6
severity: medium
tickets:
  - T-0057
problem_statement: >
  Composed artifact payloads included artifact_composition metadata, but the
  state-pack validator did not independently verify that metadata against the
  final artifact mapping before candidate acceptance or publish.
root_cause: >
  Composition audit metadata was generated at composition time before adding
  state-pack validation logic to detect stale or tampered metadata.
affected_files:
  - domain/state_artifact_composition.md
  - src/pga_workbench/services/artifact_composition.py
  - src/pga_workbench/state/packs.py
  - tests/test_artifact_composition.py
tests_required:
  - .venv/bin/pytest tests/test_artifact_composition.py tests/test_workbench_mvp.py
  - .venv/bin/pytest
  - .venv/bin/artemis validate --strict --ticket T-0057
approval:
  status: approved
  approved_by: user_request
  approved_at: 2026-06-06T00:00:00Z
rollback_plan: >
  Remove state-pack validation of artifact_composition metadata while keeping
  the metadata generation and deterministic artifact composition service.
