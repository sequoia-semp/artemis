change_id: CR-0039
title: Power system artifact product registry
created_at: 2026-06-06T00:00:00Z
change_class: 6
severity: medium
tickets:
  - T-0058
problem_statement: >
  Artifact composition metadata used a code-level product-key set, but the
  repo did not have a registry declaring which power-system state artifact keys
  were approved source products, derived products, or candidate descriptors.
root_cause: >
  Earlier direct-source passes added feed descriptors and artifact builders
  before promoting state artifact product identity into governance.
affected_files:
  - domain/power_system_artifact_products.md
  - registries/power_system_artifact_products.yaml
  - schemas/power_system_artifact_product.schema.json
  - src/pga_workbench/registry.py
  - src/pga_workbench/services/power_system_artifact_products.py
  - src/pga_workbench/validation/runner.py
  - tests/test_power_system_artifact_products.py
tests_required:
  - .venv/bin/pytest tests/test_power_system_artifact_products.py tests/test_artifact_composition.py tests/test_native_validation_runner.py
  - .venv/bin/pytest
  - .venv/bin/artemis validate --strict --ticket T-0058
approval:
  status: approved
  approved_by: user_request
  approved_at: 2026-06-06T00:00:00Z
rollback_plan: >
  Remove the artifact product registry, schema, service, native validation hook,
  tests, and documentation. Artifact composition would continue using its
  internal product-key set without registry governance.
