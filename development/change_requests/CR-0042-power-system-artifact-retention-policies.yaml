change_id: CR-0042
title: Power system artifact retention policies
created_at: 2026-06-06T00:00:00Z
change_class: 6
severity: medium
tickets:
  - T-0061
problem_statement: >
  Direct PJM source ingestion is broadening across fundamentals and prices, but
  artifact products do not yet have executable hot/warm/cold retention and
  publish-policy checks tied to the product registry.
root_cause: >
  Forecast retention existed as a narrow config guardrail before the broader
  power-system artifact product registry and direct PJM source products were
  introduced.
affected_files:
  - domain/power_system_retention.md
  - registries/power_system_artifact_retention_policies.yaml
  - schemas/power_system_artifact_retention_policy.schema.json
  - src/pga_workbench/registry.py
  - src/pga_workbench/services/power_system_retention.py
  - src/pga_workbench/validation/runner.py
  - tests/test_power_system_retention.py
tests_required:
  - .venv/bin/pytest tests/test_power_system_retention.py tests/test_power_system_artifact_products.py tests/test_native_validation_runner.py
  - .venv/bin/pytest
  - .venv/bin/artemis validate --strict --ticket T-0061
approval:
  status: approved
  approved_by: user_request
  approved_at: 2026-06-06T00:00:00Z
rollback_plan: >
  Remove the retention policy registry, schema, validation service, and native
  validation hook. The existing artifact product publish gate remains in place.
