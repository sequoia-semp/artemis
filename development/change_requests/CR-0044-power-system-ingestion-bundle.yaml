  - src/pga_workbench/services/power_system_ingestion.py
  - tests/test_power_system_ingestion.py
tests_required:
  - .venv/bin/pytest tests/test_power_system_ingestion.py tests/test_artifact_composition.py tests/test_artemis_cli.py
  - .venv/bin/pytest
  - .venv/bin/artemis validate --strict --ticket T-0063
approval:
  status: approved
  approved_by: user_request
  approved_at: 2026-06-06T00:00:00Z
rollback_plan: >
  Remove the bundle service and CLI commands. Existing individual PJM artifact
  builders, composition CLI, and state-pack build/publish paths remain intact.
