problem_statement: >
  PJM direct-source loaders can build individual fundamentals, price,
  generation mix, and price-shape artifacts, but there is no single deterministic
  bundle command that assembles the approved morning artifact set for inspection
  or state-pack candidate building.
root_cause: >
  Source/product passes were implemented incrementally by artifact family before
  adding an orchestration layer across fundamentals and prices.
affected_files:
  - domain/power_system_ingestion.md
