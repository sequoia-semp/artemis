  - src/pga_workbench/services/power_system_state.py
  - tests/test_power_system_state.py
tests_required:
  - .venv/bin/pytest tests/test_power_system_state.py tests/test_power_system_ingestion.py tests/test_artifact_composition.py
  - .venv/bin/pytest
  - .venv/bin/artemis validate --strict --ticket T-0067
approval:
  status: approved
  approved_by: user_request
  approved_at: 2026-06-06T00:00:00Z
rollback_plan: >
  Remove the bundle candidate staging service and CLI commands. Existing bundle
  creation and state-pack build/publish operations remain intact.
