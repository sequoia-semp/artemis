change_id: CR-0053
title: PJM live smoke source error evidence
created_at: 2026-06-06T00:00:00Z
change_class: 6
severity: medium
tickets:
  - T-0072
problem_statement: >
  PJM live smoke can verify preflight and metadata successfully, then fail with
  an exception during one selected source-row fetch, preventing operators from
  receiving the partial readiness evidence needed to diagnose the source path.
root_cause: >
  The smoke service treated each source-row fetch as an exception boundary for
  the whole report instead of recording per-source fetch errors as redacted
  evidence and blockers.
affected_files:
  - domain/power_system_preflight.md
  - src/pga_workbench/services/power_system_live_smoke.py
  - tests/test_power_system_live_smoke.py
tests_required:
  - .venv/bin/pytest tests/test_power_system_live_smoke.py tests/test_power_system_preflight.py
  - .venv/bin/pytest
  - .venv/bin/artemis validate --strict --ticket T-0072
approval:
  status: approved
  approved_by: user_request
  approved_at: 2026-06-06T00:00:00Z
rollback_plan: >
  Restore exception propagation during source-row smoke fetches. The smoke
  command would again fail before writing partial source evidence.
