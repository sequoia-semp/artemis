change_id: CR-0054
title: Power-system source readiness schema
created_at: 2026-06-06T00:00:00Z
change_class: 6
severity: medium
tickets:
  - T-0073
problem_statement: >
  PJM live smoke emits useful readiness evidence, but the report shape is not
  yet formalized as a generic power-system source readiness contract that other
  operator/source implementations can reuse.
root_cause: >
  The live smoke command was added as a PJM-first operational tool before its
  report envelope was promoted to a schema-validated power-system abstraction.
affected_files:
  - domain/power_system_preflight.md
  - schemas/power_system_source_readiness.schema.json
  - src/pga_workbench/cli.py
  - src/pga_workbench/services/power_system_live_smoke.py
  - tests/test_power_system_live_smoke.py
tests_required:
  - .venv/bin/pytest tests/test_power_system_live_smoke.py tests/test_power_system_preflight.py
  - .venv/bin/pytest
  - .venv/bin/artemis validate --strict --ticket T-0073
approval:
  status: approved
  approved_by: user_request
  approved_at: 2026-06-06T00:00:00Z
rollback_plan: >
  Remove the source readiness schema and validation call. Existing PJM live
  smoke report generation would continue without schema enforcement.
