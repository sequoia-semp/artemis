problem_statement: >
  Bounded live PJM generation-mix bundle construction fails when Data Miner
  gen_by_fuel publishes the source fuel label Storage because the canonical
  power generation fuel registry does not include a storage fuel.
root_cause: >
  The initial generation-mix registry covered common fuel labels from fixtures
  and earlier smoke samples, but not the live source-backed Storage label now
  observed in PJM gen_by_fuel.
affected_files:
  - domain/power_generation_mix.md
  - registries/power_generation_fuels.yaml
  - tests/test_generation_mix.py
tests_required:
  - .venv/bin/pytest tests/test_generation_mix.py tests/test_power_system_ingestion.py
  - .venv/bin/pytest
  - .venv/bin/artemis validate --strict --ticket T-0075
approval:
  status: approved
  approved_by: user_request
  approved_at: 2026-06-06T00:00:00Z
rollback_plan: >
  Remove STORAGE from the generation fuel registry. Live PJM gen_by_fuel rows
  with Storage would fail closed again until a replacement mapping is approved.
