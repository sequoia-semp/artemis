change_id: CR-0058
title: Power system source publication lifecycle semantics
created_at: 2026-06-06T00:00:00Z
change_class: 6
severity: high
tickets:
  - T-0077
problem_statement: >
  Direct PJM Data Miner source integration needed a generic power-system
  publication lifecycle layer so source cadence, finality, revision handling,
  retention alignment, and authoritative-use status are explicit before source
  artifacts are treated as publishable state-pack inputs.
root_cause: >
  The source catalog captured source families, terms, feed references, and query
  planning, but it did not yet make publication lifecycle semantics executable.
  That left a gap between source discovery and authoritative state promotion.
affected_files:
  - docs/OFFICIAL_SOURCE_REGISTER.md
  - domain/power_system_source_catalog.md
  - registries/power_system_source_catalog.yaml
  - schemas/power_system_source_publication.schema.json
  - src/pga_workbench/services/power_system_sources.py
  - tests/test_power_system_source_catalog.py
tests_required:
  - .venv/bin/pytest tests/test_power_system_source_catalog.py
  - .venv/bin/pytest
  - .venv/bin/artemis validate --strict --ticket T-0077
approval:
  status: approved
  approved_by: user_request
  approved_at: 2026-06-06T00:00:00Z
rollback_plan: >
  Remove the publication_lifecycle schema requirement, PJM catalog lifecycle
  fields, lifecycle validation helper, tests, and documentation changes. The
  source catalog would return to source-family and query-planning semantics
  only.
