change_id: CR-0059
title: Source publication evidence on power-system bundles
created_at: 2026-06-06T00:00:00Z
change_class: 6
severity: high
tickets:
  - T-0078
problem_statement: >
  PJM source publication lifecycle semantics needed to travel with ingestion
  bundle metadata so source authority, candidate status, and revision/finality
  classifications can be inspected at the artifact boundary without opening
  registry files.
root_cause: >
  The bundle metadata contained preflight, metadata-verification, and source
  readiness evidence, but not the source-publication lifecycle evidence that
  distinguishes approved authoritative source surfaces from candidate source
  discovery.
affected_files:
  - domain/power_system_ingestion.md
  - src/pga_workbench/cli.py
  - src/pga_workbench/services/power_system_ingestion.py
  - src/pga_workbench/services/power_system_sources.py
  - tests/test_power_system_ingestion.py
  - tests/test_power_system_state.py
  - tests/test_power_system_source_catalog.py
tests_required:
  - .venv/bin/pytest tests/test_power_system_ingestion.py tests/test_power_system_state.py tests/test_power_system_source_catalog.py
  - .venv/bin/pytest
  - .venv/bin/artemis validate --strict --ticket T-0078
approval:
  status: approved
  approved_by: user_request
  approved_at: 2026-06-06T00:00:00Z
rollback_plan: >
  Remove the source-publication report helper, bundle metadata evidence,
  pipeline summary field, tests, and ingestion documentation additions. Bundle
  metadata would return to preflight, metadata-verification, and source
  readiness evidence only.
