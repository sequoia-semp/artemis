change_id: CR-0066
title: Power location source identity validation
created_at: 2026-06-06T00:00:00Z
change_class: 6
severity: high
tickets:
  - T-0085
problem_statement: >
  Approved power locations needed source identity validation before direct PJM
  LMP artifacts can be treated as authoritative source products by location.
root_cause: >
  PJM pnode verification existed when pnode rows were supplied, but strict
  registry/reference validation did not yet require approved PJM power locations
  to carry complete verified pnode identity metadata or reject duplicate pnode
  mappings.
affected_files:
  - domain/power_locations.md
  - src/pga_workbench/services/power_system_locations.py
  - src/pga_workbench/validation/runner.py
  - tests/test_power_system_price_core.py
tests_required:
  - .venv/bin/pytest tests/test_power_system_price_core.py tests/test_native_validation_runner.py
  - .venv/bin/pytest
  - .venv/bin/artemis validate --strict --ticket T-0085
approval:
  status: approved
  approved_by: user_request
  approved_at: 2026-06-06T00:00:00Z
rollback_plan: >
  Remove the power-system location source identity validator from the service
  layer and strict validation runner. Existing runtime pnode verification during
  price artifact construction would remain unchanged.
