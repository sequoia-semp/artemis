change_id: CR-0068
title: Hourly LMP history retention policy
created_at: 2026-06-06T00:00:00Z
change_class: 6
severity: high
tickets:
  - T-0087
problem_statement: >
  Direct PJM price ingestion needed machine-readable retention semantics for
  hourly LMP history so heatmap windows are backed by approved source-product
  restoration policy rather than implicit artifact availability.
root_cause: >
  Retention policy had hot/warm/cold text scopes, but did not validate approved
  restoration query plans, derived view windows, or the row-version policy for
  PJM hourly LMP history.
affected_files:
  - domain/power_system_prices.md
  - domain/power_system_retention.md
  - registries/power_system_artifact_retention_policies.yaml
  - schemas/power_system_artifact_retention_policy.schema.json
  - src/pga_workbench/services/power_system_retention.py
  - tests/test_power_system_retention.py
tests_required:
  - .venv/bin/pytest tests/test_power_system_retention.py
  - .venv/bin/pytest
  - .venv/bin/artemis validate --strict --ticket T-0087
approval:
  status: approved
  approved_by: user_request
  approved_at: 2026-06-06T00:00:00Z
rollback_plan: >
  Remove historical_source_policy from retention schema and registry, then
  remove the source-history validation checks. Existing hot/warm/cold text
  retention scopes would remain.
