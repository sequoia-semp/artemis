change_id: CR-0069
title: Heatmap retention policy windows
created_at: 2026-06-06T00:00:00Z
change_class: 4
severity: medium
tickets:
  - T-0088
problem_statement: >
  Heatmap history windows needed to consume the retention policy established for
  PJM hourly LMP source products instead of depending only on matching local
  defaults.
root_cause: >
  The heatmap builder predated machine-readable historical source retention
  policy, so the 1d/5d/10d/30d windows were encoded directly in the service.
affected_files:
  - src/pga_workbench/cli.py
  - src/pga_workbench/services/heatmap.py
  - tests/test_forward_price_heatmap.py
tests_required:
  - .venv/bin/pytest tests/test_forward_price_heatmap.py tests/test_power_system_retention.py
  - .venv/bin/pytest
  - .venv/bin/artemis validate --strict --ticket T-0088
approval:
  status: approved
  approved_by: user_request
  approved_at: 2026-06-06T00:00:00Z
rollback_plan: >
  Remove the retention-policy lookup from the heatmap builder and CLI registry
  flag, returning to local default history windows.
