change_id: CR-0085
title: HotState source evidence view projection
created_at: 2026-06-06T00:00:00Z
change_class: 4
severity: medium
tickets:
  - T-0104
problem_statement: >
  Analyst views needed a deterministic way to surface accepted source-audit
  evidence from power-system bundles without bypassing HotState.
root_cause: >
  Source-audit evidence was stored in bundle metadata, but the view merge layer
  only copied direct view fields and did not project compact bundle metadata
  into the view evidence array.
affected_files:
  - docs/user/analyst_mode.md
  - src/pga_workbench/analyst/view_engine.py
  - tests/test_analyst_views.py
tests_required:
  - .venv/bin/pytest tests/test_analyst_views.py
  - .venv/bin/pytest
  - .venv/bin/artemis validate --strict --ticket T-0104
approval:
  status: approved
  approved_by: user_request
  approved_at: 2026-06-06T00:00:00Z
rollback_plan: >
  Remove the bundle metadata projection from the view merge layer, remove the
  Analyst Mode documentation note, and remove the view regression test.
