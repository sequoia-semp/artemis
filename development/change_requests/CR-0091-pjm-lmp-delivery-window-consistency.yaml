problem_statement: >
  PJM hourly LMP normalization needed to prove that source UTC delivery starts
  are exact hourly windows and that PJM EPT source timestamps agree with the
  UTC instant before canonical source price promotion.
root_cause: >
  Prior normalization parsed `datetime_beginning_utc` and preserved
  `datetime_beginning_ept` lineage, but did not compare the two timestamp
  fields or reject non-hourly UTC delivery starts.
