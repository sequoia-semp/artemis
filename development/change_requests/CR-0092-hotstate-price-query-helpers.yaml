change_id: CR-0092
title: HotState price query helpers
created_at: 2026-06-06T00:00:00Z
change_class: 4
severity: low
tickets:
  - T-0111
problem_statement: >
  Accepted price artifacts needed an explicit HotState query helper so Analyst,
  heatmap, and future UI paths can consume source-backed and derived price
  points without direct adapter access or raw artifact spelunking.
root_cause: >
  HotState exposed only the whole artifacts mapping. Consumers could read
  price_surface_points, but source-published and derived shape products were not
  separated by a governed read helper.
affected_files:
  - docs/architecture/direct_pjm_authoritative_sources.md
  - docs/user/analyst_mode.md
  - src/pga_workbench/cache/hot_state.py
  - src/pga_workbench/cli.py
  - tests/test_hot_state_price_queries.py
tests_required:
  - .venv/bin/pytest tests/test_hot_state_price_queries.py tests/test_forward_price_heatmap.py
  - .venv/bin/pytest
  - .venv/bin/artemis validate --strict --ticket T-0111
approval:
  status: approved
  approved_by: user_request
  approved_at: 2026-06-06T00:00:00Z
rollback_plan: >
  Remove the HotState price query helpers, revert the heatmap command to direct
  artifact access, remove the read-path documentation notes, and delete the
  helper regression tests.
