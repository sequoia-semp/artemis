change_id: CR-0096
title: Valuation correctness oracle and fail-closed economics
created_at: 2026-06-06T00:00:00Z
change_class: 5
severity: high
tickets:
  - T-0115
  - T-0116
  - T-0117
  - T-0118
  - T-0119
  - T-0120
  - T-0121
problem_statement: >
  The valuation layer has deterministic services for PnL, historical VaR, and
  Black-76 screening Greeks, but it does not yet have an executed economic
  correctness oracle and has fail-open risk paths that can understate risk.
root_cause: >
  Prior MVP work emphasized typed artifacts and structural regression tests.
  It did not require independently hand-derived golden scenarios or fail-closed
  construction of VaR factor joins before publishing valuation outputs.
affected_files:
  - domain/price_instrument_model.md
  - configs/risk_policy.yaml
  - src/pga_workbench/models.py
  - src/pga_workbench/services/pnl.py
  - src/pga_workbench/services/risk.py
  - src/pga_workbench/services/greeks.py
  - tests/golden/
  - tests/test_price_instrument_spine.py
  - tests/test_workbench_mvp.py
tests_required:
  - .venv/bin/python -m pytest tests/golden tests/test_price_instrument_spine.py tests/test_workbench_mvp.py -q
  - .venv/bin/artemis validate --strict --ticket T-0115
approval:
  status: approved
  approved_by: user_request
  approved_at: 2026-06-06T00:00:00Z
rollback_plan: >
  Remove the golden scenario harness and restore the previous PnL, VaR, and
  Greeks behavior, then rerun the pre-change regression suite.
