change_id: CR-0097
title: Live PJM operational safety hardening
created_at: 2026-06-06T00:00:00Z
change_class: 7
severity: high
tickets:
  - T-0122
  - T-0123
  - T-0124
  - T-0125
  - T-0127
problem_statement: >
  The PJM live path needs runtime throttling, bounded retry, validated rate
  overrides, constructive redaction guarantees, and strict envelope handling
  before live keys are used at volume.
root_cause: >
  Existing gates bound query plans and require redacted evidence, but they do
  not yet enforce a wall-clock request budget or reject every malformed runtime
  envelope constructively.
affected_files:
  - src/pga_workbench/adapters/
  - src/pga_workbench/services/
  - src/pga_workbench/cli.py
  - tests/test_pjm_dataminer_connector.py
  - tests/test_source_query_plans.py
  - tests/test_power_system_ingestion.py
tests_required:
  - .venv/bin/python -m pytest tests/test_pjm_dataminer_connector.py tests/test_source_query_plans.py tests/test_power_system_ingestion.py -q
approval:
  status: approved
  approved_by: user_request
  approved_at: 2026-06-06T00:00:00Z
rollback_plan: >
  Remove the limiter/backoff/redaction hardening and restore prior connector and
  source-evidence behavior, then rerun PJM connector and ingestion regression tests.
