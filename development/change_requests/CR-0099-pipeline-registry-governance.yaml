  - src/pga_workbench/validation/
  - tests/
tests_required:
  - .venv/bin/python -m pytest tests/test_power_system_state.py tests/test_power_system_ingestion.py tests/test_registry_validation.py -q
  - .venv/bin/artemis validate --strict --ticket T-0137
