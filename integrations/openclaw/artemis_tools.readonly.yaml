version: 0.1.0
mode: readonly
authoritative: false

allowed_tools:
  artemis_work_context:
    description: Build deterministic context bundle for a work ticket.
    command_template: "pga work-context --ticket {ticket} --output {output}"
    mutates_repo: false
    requires_approval: false

  artemis_validate_registries:
    command_template: "pga validate-registries"
    mutates_repo: false
    requires_approval: false

  artemis_validate_work_items:
    command_template: "pga validate-work-items"
    mutates_repo: false
    requires_approval: false

  artemis_pytest:
    command_template: "python -m pytest -q"
    mutates_repo: false
    requires_approval: false

forbidden_tools:
  artemis_publish_state_pack:
    command_template: "pga build-state-pack --publish"
    reason: "State promotion requires Artemis-native approval controls."

  git_push:
    command_template: "git push"
    reason: "Remote mutation requires explicit human approval."

  git_tag:
    command_template: "git tag"
    reason: "Release mutation requires explicit human approval."

  convention_change:
    reason: "Convention changes require change request and tests."
