      url: https://www.pjm.com/-/media/DotCom/etools/data-miner-2/data-miner-2-api-guide.ashx
      notes: Documents PJM Data Miner pnode and real-time LMP feeds; committed PJM pnode fixture verifies 51288 = WESTERN HUB.
