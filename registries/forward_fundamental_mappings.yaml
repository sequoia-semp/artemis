  mapping_type: forward_contract_to_fundamental_lmp
  target:
    index_id: PJM.WH.RT.FULL_LMP.PEAK
    commodity: power
    location_id: WH
    market_run: RT
    price_component: FULL_LMP
    shape: PEAK
