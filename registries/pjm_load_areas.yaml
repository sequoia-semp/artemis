PJM_RTO:
  display_name: PJM RTO
  market: PJM
  commodity: power
  area_type: rto
  feed_values: [RTO, RTO_COMBINED, PJM RTO]
  source_documents:
    - authority: PJM Data Miner API Guide
      url: https://www.pjm.com/-/media/DotCom/etools/data-miner-2/data-miner-2-api-guide.ashx
      notes: Documents RTO and RTO_COMBINED as PJM load forecast area values across forecast feeds.
  verification_status: official_pjm_documented
  status: approved_core

