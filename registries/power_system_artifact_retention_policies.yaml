    cold:
      tier: cold
      scope: Historical hourly LMP pulls are source-restorable only through approved bounded query plans.
      max_age_days: null
  historical_source_policy:
    source_restorable: true
    approved_query_plan_ids:
      - PJM_DATAMINER_HOURLY_LMP_DAILY_CHUNKS
    derived_view_windows_days:
      - 1
      - 5
      - 10
      - 30
    max_hot_history_days: 30
    row_version_policy: current_row_filter_required
  source_documents:
    - authority: domain/power_system_prices.md
      url: domain/power_system_prices.md
      notes: Documents source-specific PJM hourly LMP observations and canonical price-surface products.
    - authority: registries/power_system_source_query_plans.yaml
      url: registries/power_system_source_query_plans.yaml
      notes: Establishes bounded query planning for hourly PJM LMP history.
  verification_status: user_approved
  status: approved_core

