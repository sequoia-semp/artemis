pjm_load_fundamentals:
  display_name: PJM load fundamentals artifact retention
  commodity: power
  operator_id: PJM
  product_family: load
  state_pack_publish_allowed: true
  lineage_required: true
  source_specific_required: true
  forecast_revision_policy: latest_curve_hot_revision_history_separate
  retention_tiers:
    hot:
      tier: hot
      scope: Latest accepted state-pack artifact plus latest load forecast curve.
      max_age_days: 14
    warm:
      tier: hot_warm
      scope: Six-hour and twelve-hour forecast revisions for the past seven days.
      max_age_days: 7
    cold:
      tier: cold
      scope: Older exact forecast revisions remain cold/source-restorable and separate from latest curves.
      max_age_days: null
  historical_source_policy:
    source_restorable: true
    approved_query_plan_ids:
      - PJM_DATAMINER_LOAD_BOUNDED_INTERVAL
    derived_view_windows_days:
      - 14
    max_hot_history_days: 14
    row_version_policy: not_applicable
  source_documents:
    - authority: configs/forecast_retention_policy.yaml
      url: configs/forecast_retention_policy.yaml
      notes: Establishes latest-curve hot retention and separate revision-history retention.
    - authority: domain/pjm_fundamentals.md
      url: domain/pjm_fundamentals.md
      notes: Documents source-specific PJM load products, best-series selection, and latest-versus-revision separation.
  verification_status: user_approved
  status: approved_core

pjm_power_prices:
