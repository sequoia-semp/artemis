power_system_operational_event_feeds:
  display_name: Power system operational event descriptor retention
  commodity: power
  operator_id: PJM
  product_family: operational_events
  state_pack_publish_allowed: false
  lineage_required: false
  source_specific_required: false
  forecast_revision_policy: candidate_pending
  retention_tiers:
    hot:
      tier: candidate_only
      scope: Candidate descriptors may be kept in registries and tests but cannot publish to accepted state.
      max_age_days: null
    warm:
      tier: not_applicable
      scope: Warm retention is deferred until outage and constraint lifecycle semantics are approved.
      max_age_days: null
    cold:
      tier: deferred
      scope: Cold retention is deferred until operational event contracts and topology linkage are approved.
      max_age_days: null
  historical_source_policy:
    source_restorable: false
    approved_query_plan_ids: []
    derived_view_windows_days: []
    max_hot_history_days: null
    row_version_policy: source_specific_pending
  source_documents:
    - authority: domain/power_system_operational_events.md
      url: domain/power_system_operational_events.md
      notes: Documents candidate-only outage and constraint feed descriptors.
  verification_status: candidate
  status: candidate
