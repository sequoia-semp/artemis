PJM_DATAMINER_API_PUBLIC_USE:
  display_name: PJM Data Miner API public-use access policy
  access_surface: pjm_data_miner_api
  source_kind: iso_rto_api
  account_classes:
    non_member:
      max_connections_per_minute: 6
    member:
      max_connections_per_minute: 600
  default_account_class: non_member
  row_count:
    minimum: 1
    maximum: 50000
    default: 50000
  pagination:
    default_max_pages: 1
    allow_unbounded: false
  archive_policy:
    policy: archive_aware_required
    notes: Historical Data Miner pulls, especially LMP history, must remain explicitly bounded until archive-aware query planning is implemented per feed family.
  source_documents:
    - authority: PJM Data Miner
      url: https://www.pjm.com/markets-and-operations/etools/data-miner-2
      notes: Documents member and non-member connection limits and redistribution restrictions for Data Miner.
    - authority: PJM Data Miner API Guide
      url: https://www.pjm.com/-/media/DotCom/etools/data-miner-2/data-miner-2-api-guide.ashx
      notes: Documents rowCount, startRow, and paginated search behavior, including the 50,000 maximum row count.
  status: approved_core
