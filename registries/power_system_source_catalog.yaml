PJM_DATAMINER_LOAD_ACTUALS:
  display_name: PJM Data Miner load actual source publications
  market_operator: PJM
  market: PJM
  commodity: power
  source_kind: iso_rto_api
  access_surface: pjm_data_miner_api
  product_family: load
  source_feed_names:
    - hrl_load_metered
    - hrl_load_prelim
  registry_feed_ids:
    - hrl_load_metered
    - hrl_load_prelim
  contract_families:
    - fundamentals
    - iso_load
  canonical_roles:
    - source_observation
  publication_lifecycle:
    cadence: hourly
    market_day_basis: operating_day
    publication_finality: mixed
    revision_policy: none_expected
    retention_alignment: hot_latest
    authoritative_use: candidate_metadata_only
  query_planning:
    timezone: source_mixed
    timestamp_policy: utc_delivery_windows_required
    archive_policy: standard_paginated
  terms:
    internal_use_only: true
    redistribution_requires_license: true
    rate_limit_notes: PJM Data Miner terms limit connections by membership class; live jobs must remain explicitly bounded.
  source_documents:
    - authority: PJM Data Miner API Guide
      url: https://www.pjm.com/-/media/DotCom/etools/data-miner-2/data-miner-2-api-guide.ashx
      notes: Documents Data Miner feed search mechanics and load actual feed names.
    - authority: PJM Data Miner
      url: https://www.pjm.com/markets-and-operations/etools/data-miner-2
      notes: Documents Data Miner access terms, connection limits, and redistribution restrictions.
  verification_status: candidate
  status: candidate

