PJM_DATAMINER_HOURLY_LMP_DAILY_CHUNKS:
  display_name: PJM Data Miner hourly LMP daily bounded query plan
  access_surface: pjm_data_miner_api
  publication_id: PJM_DATAMINER_HOURLY_LMP_CORE
  access_policy_id: PJM_DATAMINER_API_PUBLIC_USE
  applies_to_feed_ids:
    - PJM_DA_HOURLY_LMP
    - PJM_RT_HOURLY_LMP
  date_window:
    mode: inclusive_day_chunks
    max_days_per_request: 1
    inclusive_bounds: true
  planned_request_budget:
    enforce_account_class_budget: true
    metadata_requests_per_pnode: 1
  required_query_dimensions:
    - pnode_id
    - row_is_current
    - delivery_date_range
  source_documents:
    - authority: PJM Data Miner API Guide
      url: https://www.pjm.com/-/media/DotCom/etools/data-miner-2/data-miner-2-api-guide.ashx
      notes: Documents Data Miner startRow, rowCount, date-range filters, and LMP feed filtering.
    - authority: PJM Data Miner
      url: https://www.pjm.com/markets-and-operations/etools/data-miner-2
      notes: Documents Data Miner access terms and connection limits used as the request budget.
  status: approved_core

