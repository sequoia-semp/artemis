id: analyst.build_eastern_power_view
class: analyst
intent: Build an Eastern Interconnection power view from registered regions and supplied inputs.
inputs:
  required: []
  optional:
    - weather_forecast
    - iso_load
    - iso_outages
    - vendor_fundamentals
tools:
  - analyst_view_build
outputs:
  - view.eastern_power_market
llm_role:
  allowed:
    - summarize
    - synthesize
    - explain
    - rank_drivers
  forbidden:
    - invent_conventions
    - define_product_mapping
    - place_trades
validation:
  schemas:
    - schemas/view.schema.json
