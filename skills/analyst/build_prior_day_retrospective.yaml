id: analyst.build_prior_day_retrospective
class: analyst
intent: Build a prior-day retrospective against available morning forecast inputs.
inputs:
  required: []
  optional:
    - load_forecast
    - actual_load
    - weather_forecast
    - iso_outages
tools:
  - analyst_view_build
outputs:
  - view.prior_day_retrospective
llm_role:
  allowed:
    - summarize
    - synthesize
    - explain
    - rank_drivers
  forbidden:
    - invent_conventions
    - define_product_mapping
    - place_trades
validation:
  schemas:
    - schemas/view.schema.json
