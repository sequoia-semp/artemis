acceptance_criteria:
  - Every Artemis mode default tool resolves to a registered tool with compatible permissions.
  - Active wrapper prompts are thin shims over deterministic Artemis commands.
  - Artemis development context is the canonical context path; compatibility aliases are labeled as aliases only.
  - Strict validation detects context, wrapper, tool, and skill surface drift.
  - Prompt-only analytics are never treated as authoritative for PnL, risk, Greeks, forecasts, state, mappings, or conventions.
