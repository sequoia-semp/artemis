id: T-0001
type: ticket
title: Merge existing non-main branch before new governance work
status: done
owner: null
epic: E-0001
sprint: S-0001
risk: high
created_at: "2026-06-04"
updated_at: "2026-06-04"
layer: [vcs]
branch: intake/codex-power-gas-workbench-plan
problem: >
  A non-main branch may contain the actual scaffold or follow-up work. Governance
  and future workscope should not be layered onto stale main without first resolving
  branch state.
tasks:
  - Run git fetch --all --prune.
  - List all local and remote branches.
  - Compare each non-main branch to main.
  - Merge, reject, or partially extract branch content.
  - Document decision in planning/merge_intake.md.
  - Run python -m pytest -q.
  - Tag post-merge baseline recommendation.
acceptance_criteria:
  - planning/merge_intake.md exists.
  - Existing branch is merged, rejected, or explicitly documented as absent.
  - Test result is recorded.
  - Baseline tag recommendation is documented.
required_tests:
  - python -m pytest -q
  - pga validate-registries
affected_files:
  - planning/merge_intake.md
change_request_required: false
