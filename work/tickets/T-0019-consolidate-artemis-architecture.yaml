problem: 'The repository has a first-pass Artemis 0.2.0 architecture, but primary
  docs, validation, and runtime context still route through legacy build-packet and
  local-wrapper scaffolding.

  '
tasks:
- Rewrite primary navigation around Artemis product identity.
- Add docs/README.md as the central docs index.
- Update AGENTS.md and llms.txt to point at artemis.yaml and current authority files.
- Mark legacy build-packet/local-LLM entrypoints as compatibility/design records.
- Refactor Development Mode context to load from artemis.yaml instead of local/llm_config.example.yaml.
- Keep pga work-context usable as a compatibility command backed by the Artemis context
  shape.
- Expand Makefile validation to include first-class Artemis artifacts.
- Normalize integration docs and descriptor directories.
- Harden release check and release candidate metadata.
- Add regression tests for navigation, context, validation, and descriptors.
acceptance_criteria:
- Primary docs orient through README.md, AGENTS.md, llms.txt, artemis.yaml, docs/README.md,
  and artemis capabilities.
- artemis dev context does not depend on local/llm_config.example.yaml.
- pga work-context remains usable and returns the Artemis development-context shape.
- make validate runs tests, registry/work/KB validation, Artemis config, skills, views,
  data sources, and capabilities.
- Integration descriptors referenced by artemis.yaml exist and are non-authoritative.
- Release candidate output includes package version, validation commands/statuses,
  and manifest hashes.
