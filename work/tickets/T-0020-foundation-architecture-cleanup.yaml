problem: >
  Root/product entrypoints still contain convention math, root planning bridge
  files, and wrapper-specific artifacts. Artemis needs a workflow-traced root
  contract with optional integrations represented as descriptors.
tasks:
  - Remove individual market-convention math from README, AGENTS.md, and llms.txt.
  - Move root planning bridge files to archive/backlog locations.
  - Demote legacy wrapper/build-packet docs under docs/archive.
  - Convert local/llm_config.example.yaml to a minimal legacy stub.
  - Move active OpenCode example config under integrations/coding_backends/opencode/.
  - Keep root opencode.jsonc as a minimal permissions-only compatibility shim.
  - Refactor wrapper tests into descriptor/foundation tests.
  - Add tests/test_repo_foundation_contract.py.
  - Preserve pga work-context compatibility and existing pga commands.
acceptance_criteria:
  - A new agent can orient from README.md, AGENTS.md, llms.txt, artemis.yaml, docs/README.md, and artemis capabilities.
  - Root Markdown files are limited to README.md and AGENTS.md.
  - Root/product entrypoints do not contain individual market-convention math.
  - local/llm_config.example.yaml is absent or a minimal legacy stub.
  - opencode.jsonc, if present, is a permissions-only compatibility shim.
  - Optional integration descriptors are non-authoritative.
