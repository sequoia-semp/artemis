problem: 'ICE PJM Western Hub real-time peak contracts PMI and PDP need to map deterministically
  to the PJM Western Hub RT full-LMP peak index and pnode 51288 so forward price artifacts
  can be compared with fundamental LMP history without an ICE API dependency.

  '
tasks:
- Add source-backed exchange contract specs for ICE PMI and PDP.
- Add deterministic forward-to-fundamental mappings from PMI/PDP to PJM.WH.RT.FULL_LMP.PEAK.
- Record WH pnode 51288 semantics with explicit source status.
- Add registry schemas and validation handlers for contract and mapping records.
- Extend market-index normalization to resolve raw PMI/PDP marks through the mapping.
- Add regression tests for mapping resolution, mark normalization lineage, and source-document
  enforcement.
- Document the mapping and official source status.
acceptance_criteria:
- Registry validation accepts exchange_contracts.yaml and forward_fundamental_mappings.yaml
  with no warnings.
- PMI and PDP resolve to PJM.WH.RT.FULL_LMP.PEAK with market_run RT, price_component
  FULL_LMP, shape PEAK, and quote_unit USD_per_MWh.
- The mapping target preserves pnode_id 51288, pnode_name WESTERN HUB, pnode_type
  HUB, and PJM feed names.
- Raw marks with product PMI normalize to PJM.WH.RT.FULL_LMP.PEAK.<period> and preserve
  source_contract_id and mapping_id lineage.
- Official exchange contract records cannot omit source_documents.
- No ICE API, PJM API, vendor connector, cache, or state-pack publishing behavior
  is introduced.
