context_profile: trading_domain
problem: 'Artemis needs listed ICE natural gas outright, basis, swing, and index contracts
  to map into canonical gas daily/monthly index families with explicit formula semantics,
  using the same core architecture as the PJM power forward mapping demo.

  '
tasks:
- Generalize exchange contract and contract mapping schemas for gas index families
  and formula legs.
- Add official ICE gas contract records for Henry LD1, TETCO M2 fixed/basis/swing/index,
  TETCO M3 basis/index, Transco Z6 NY fixed/swing/basis, Transco Z6 non-NY fixed/basis/swing/index,
  Transco Z5 fixed/basis/swing/index, Transco Z5 South fixed/basis/swing/index, and
  Eastern Gas South basis/index contracts.
- Add gas contract-to-index mappings for LD1, IFERC, GDD, BASIS_TO_LD1, and GDD_INDEX_TO_IFERC
  targets.
- Document gas formula conventions and the contract-to-index storage model.
- Add regression tests for gas symbol normalization, formula preservation, and mark
  lineage.
acceptance_criteria:
- ICE gas symbols H, BM1, BM2, BM3, MB4, TMT, MTI, TZ6, ZSS, TZS, TPH, TPB, TPS, TPI,
  TZ5, DKR, DKS, DKT, T5Z, T5B, T5C, T5I, DOM, and DIS resolve to canonical gas MarketIndex
  records.
- Basis mappings preserve official Reference Price A minus Reference Price B formula
  legs.
- Index mappings preserve official average Gas Daily Reference Price A minus Inside
  FERC Reference Price B formula legs.
- Registry validation accepts gas exchange contracts and gas mapping records with
  no warnings.
- No live ICE API, vendor API, cache, or state-pack publishing behavior is introduced.
