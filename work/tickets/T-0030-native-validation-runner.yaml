problem: >
  Validation was spread across make targets, config command lists, individual
  CLI commands, and regression prose. Artemis needs a native validation runner
  and report model.
tasks:
  - Add validation models, runner, and report helpers.
  - Add artemis validate and artemis validate report.
  - Write deterministic JSON validation artifacts.
  - Cover runner, report, and CLI behavior with tests.
acceptance_criteria:
  - artemis validate exits zero only when required checks pass.
  - artemis validate --strict rejects skipped or schema-handler-only validation gaps.
  - Reports include checks, command results, warnings, errors, and affected file snapshots.
  - Validation runner does not depend on GitHub features.
required_tests:
  - python -m pytest tests/test_native_validation_runner.py tests/test_validation_report_artifacts.py tests/test_cli_validation_commands.py -q
  - artemis validate --strict --ticket T-0030
