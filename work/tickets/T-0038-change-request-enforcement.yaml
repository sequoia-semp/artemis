branch: codex/sprint-1-native-workflow
problem: >
  Change requests must be executable release evidence, not documentation-only
  records, especially for locked convention or explicitly CR-required tickets.
tasks:
  - Require approved change requests for CR-required tickets.
  - Require approved change requests for locked convention affected files.
  - Verify approved change requests include affected files, required tests, and rollback plan.
  - Block release readiness when ticket affected files do not overlap approved CR affected files.
acceptance_criteria:
  - CR-required tickets cannot be release-ready without approved CR evidence.
  - Locked convention file changes require change_request_required=true.
  - Incomplete approved CR metadata blocks release readiness.
  - Non-overlapping ticket and CR affected files block release readiness.
required_tests:
  - python -m pytest tests/test_release_readiness_native_validation.py tests/test_tool_permissions.py -q
