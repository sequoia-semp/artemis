problem: 'Artemis needs source-backed PJM load actual, preliminary actual, latest
  forecast, revision-history, and forecast-error semantics before the PJM-first analyst
  workflows can consume Data Miner load fundamentals through accepted state packs
  and HotState.

  '
tasks:
- Add PJM fundamental feed and load-area registries.
- Extend fundamental metric semantics for source-specific, best-series, latest-curve,
  revision-history, and derived products.
- Add a PJM Data Miner connector with env-key auth and fixture-first tests.
- Add normalized PJM load fundamental state artifacts and deterministic derivation.
- Wire a CLI command for PJM load fundamentals artifact output.
- Add tests for registries, connector, normalization, state-pack, and Analyst view
  consumption.
acceptance_criteria:
- PJM feed and load-area registries validate with schemas.
- Latest forecast curves and revision history remain separate products.
- Metered actual load is preferred over preliminary load in best-series actuals.
- The `+/-14d` output shape preserves explicit gaps instead of inferring values.
- PJM API credentials are read from env and never logged or committed.
- Analyst views consume generated artifacts through HotState.
- Bounded live Data Miner smoke command can fetch one page without walking entire feeds.
- Generated artifacts include deterministic summary, drivers, driver deltas, and current/prior/14-day view sections.
