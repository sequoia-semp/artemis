problem: >
  Add a generic power-system price source layer and implement PJM Data Miner
  pnode plus hourly DA/RT LMP normalization into HotState-ready price artifacts.
tasks:
  - Add generic power-system price feed registry and schema.
  - Add PJM pnode and hourly DA/RT LMP source descriptors.
  - Add typed PJM pnode, PJM LMP observation, and power price state contracts.
  - Normalize PJM source rows into source products and canonical hourly full-LMP price points.
  - Wire fixture-first and bounded-live CLI build paths.
  - Add fixture, registry, connector, normalization, CLI, and state-pack tests.
acceptance_criteria:
  - Power-system price feed descriptors validate with schemas and duplicate-key protection.
  - PJM pnode source rows normalize without relying on GridStatus examples.
  - PJM DA/RT hourly LMP source rows normalize with UTC delivery windows and row version lineage.
  - Canonical PriceSurfacePoint output uses explicit DA/RT FULL_LMP hourly products only.
  - Unsupported pnodes, feed IDs, components, or non-current rows fail closed.
  - CLI can build PJM hourly LMP artifacts from fixtures and parse bounded live flags.
  - Optional live smoke remains skipped unless explicitly enabled.
