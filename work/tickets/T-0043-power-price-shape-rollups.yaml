branch: codex/T-0043-power-price-shape-rollups
context_profile: trading_domain
problem: >
  Direct PJM hourly LMP ingestion produces source-backed hourly full-LMP points,
  but analyst price workflows need deterministic daily PEAK, OFFPEAK, and ATC
  shape products that are independent of source adapters.
tasks:
  - Add a power price shape-rule registry and schema.
  - Add daily PJM PEAK, OFFPEAK, and ATC rule descriptors.
  - Add a deterministic hourly-to-daily shape rollup service with explicit gaps.
  - Add CLI commands for fixture/workspace rollups.
  - Add registry, service, state-pack, and CLI tests.
acceptance_criteria:
  - Shape rules validate with schemas and duplicate-key protection.
  - Weekday PEAK uses HE 0800-2300 EPT and excludes weekends/NERC holidays.
  - OFFPEAK uses weekday HE 0100-0700 and 2400 EPT plus all weekend/holiday hours.
  - ATC uses all 24 hours and remains separate from equal-MW ATC position decomposition.
  - Incomplete days emit explicit gaps instead of inferred prices.
  - Rollup outputs preserve input hourly price lineage and rule IDs.
  - CLI can build rollup artifacts from existing price surface JSON.
required_tests:
  - .venv/bin/pytest tests/test_power_price_shape_rollups.py tests/test_power_system_price_core.py
  - .venv/bin/pytest
  - .venv/bin/artemis validate --strict --ticket T-0043
