problem: >
  Power shape rollups need calendar behavior represented as reusable domain
  contracts instead of hardcoded NERC holiday logic in services.
tasks:
  - Add a power market calendar registry and schema.
  - Register NERC holiday and PJM EPT power-day calendars.
  - Add a core calendar resolver for fixed-date, nth-weekday, and last-weekday rules.
  - Refactor daily shape rollups to use the calendar resolver.
  - Add registry, resolver, and rollup regression tests.
acceptance_criteria:
  - Calendar registry validates with schemas and duplicate-key protection.
  - NERC holidays resolve from registry rules for fixed, nth-weekday, and last-weekday dates.
  - Shape rules reference a holiday calendar instead of relying on hardcoded service constants.
  - Unknown calendars fail closed with a structured exception.
  - Existing daily PEAK/OFFPEAK/ATC rollup behavior remains unchanged.
