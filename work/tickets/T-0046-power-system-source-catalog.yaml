branch: codex/T-0046-power-system-source-catalog
context_profile: trading_domain
problem: >
  Direct PJM source ingestion needs a power-system-first source publication
  catalog that records authoritative source surfaces, candidate expansion feeds,
  terms, and query-planning constraints without making every PJM feed an
  approved normalized product.
tasks:
  - Add a generic power system source publication schema.
  - Register PJM Data Miner source publication families for load, hourly LMPs,
    five-minute LMP, generation-by-fuel, outages, and constraints.
  - Require approved core source publications to reference existing normalized
    feed descriptors.
  - Add a small service helper for loading and reference-checking the catalog.
  - Add PJM Data Miner public definition URL construction that never includes
    the API key.
  - Add regression tests for registry validation, source terms, approved/candidate
    separation, descriptor references, and connector definition URLs.
acceptance_criteria:
  - Source catalog registry validates with schemas and duplicate-key protection.
  - Approved PJM core source publications reference existing load or price feed
    descriptors.
  - Candidate expansion feeds can be cataloged without being promoted into
    normalized products.
  - PJM Data Miner terms and rate-limit notes are captured for every cataloged
    publication family.
  - Connector definition URL construction does not expose credentials.
  - No new pnodes, price components, outage semantics, topology links, or shared
    publish behavior are approved by this ticket.
required_tests:
