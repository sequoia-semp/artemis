implementation_summary: >
  Added a generic power-system source publication schema and catalog with PJM
  Data Miner as the first concrete source family, including approved load
  forecast and hourly LMP surfaces plus candidate five-minute LMP, generation,
  outage, and transmission-constraint entries. Added reference checks for
  approved normalized feed descriptors and a credential-free PJM definition URL
  helper.
