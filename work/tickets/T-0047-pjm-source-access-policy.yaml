branch: codex/T-0047-pjm-source-access-policy
context_profile: trading_domain
problem: >
  Live PJM Data Miner ingestion needs executable source access guardrails so
  direct authoritative pulls remain bounded, terms-aware, and safe for local
  operation before broader feed expansion.
tasks:
  - Add a generic source access policy schema and registry.
  - Register the PJM Data Miner public-use policy with member and non-member
    connection budgets, row-count bounds, pagination defaults, and archive notes.
  - Enforce PJM Data Miner rowCount, startRow, max-pages, and account-class
    connection budgets in the connector.
  - Default live CLI max-pages to one page instead of unbounded pagination.
  - Add regression tests tying registry policy values to connector guardrails.
acceptance_criteria:
  - Source access policy registry validates with schemas and duplicate-key protection.
  - PJM Data Miner connector rejects rowCount above 50,000 and startRow below 1.
  - PJM Data Miner connector rejects unbounded pagination and page plans beyond
    the account-class connection budget.
  - Live CLI parser defaults are bounded at one page.
  - Connector lineage reports applied access-policy limits without exposing API keys.
  - No new source products, pnodes, price components, outage semantics, topology
    links, or shared-cache publish behavior are approved by this ticket.
required_tests:
  - .venv/bin/pytest tests/test_pjm_dataminer_connector.py tests/test_source_access_policies.py
  - .venv/bin/pytest
