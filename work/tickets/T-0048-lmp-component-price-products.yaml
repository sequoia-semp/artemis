implementation_summary: >
  Extended PJM DA/RT hourly LMP feed descriptors to support FULL_LMP,
  CONGESTION, MARGINAL_LOSS, and SYSTEM_ENERGY; emitted one source-backed
  PriceSurfacePoint per supported component; preserved component lineage; added
  missing-component fail-closed behavior; and constrained daily shape rollups to
