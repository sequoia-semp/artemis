branch: codex/T-0048-lmp-component-price-products
context_profile: trading_domain
problem: >
  Direct PJM price incorporation needs source-backed LMP component products for
  congestion, marginal loss, and system energy while keeping exchange-settled
  trading products and shape rollups tied to FULL_LMP unless separately approved.
tasks:
  - Extend power-system price feed descriptors and schema to support explicit
    LMP components.
  - Emit PJM hourly PriceSurfacePoint records for FULL_LMP, CONGESTION,
    MARGINAL_LOSS, and SYSTEM_ENERGY from the same source observation.
  - Preserve raw/source component lineage on every emitted price point.
  - Fail closed when a supported source component value is missing.
  - Keep daily shape rollups constrained to hourly FULL_LMP points.
acceptance_criteria:
  - PJM DA and RT hourly LMP feed descriptors support all four LMP components.
  - Fixture normalization emits one price point per supported component.
  - Component index IDs preserve market, location, market run, component,
    granularity, and delivery period.
  - Missing supported component values fail closed with a structured exception.
  - Daily PEAK/OFFPEAK/ATC rollups ignore component points until component shape
    rules are explicitly approved.
  - No new pnodes, forward mappings, exchange products, outage semantics,
    topology links, or shared-cache publish behavior are approved by this ticket.
required_tests:
  - .venv/bin/pytest tests/test_power_system_price_core.py tests/test_power_price_shape_rollups.py
  - .venv/bin/pytest
  - .venv/bin/artemis validate --strict --ticket T-0048
affected_files:
