branch: codex/T-0049-pjm-hourly-lmp-query-planning
context_profile: trading_domain
problem: >
  Direct PJM hourly LMP ingestion needs a reusable power-system source query
  planner so date ranges and total live request counts are explicit before
  Data Miner calls are made.
tasks:
  - Add a generic source query plan schema and registry.
  - Register a PJM hourly LMP daily chunk plan tied to the existing Data Miner
    source catalog and access policy.
  - Add deterministic query-plan helpers for inclusive day windows and account
    class request budgets.
  - Route live PJM DA/RT hourly LMP fetches through the planner.
  - Add tests for registry validation, day chunking, budget rejection, member
    budget allowance, and CLI query splitting.
acceptance_criteria:
  - Source query plan registry validates with schemas and duplicate-key protection.
  - PJM hourly LMP date ranges are split into daily Data Miner date windows.
  - Planned request counts include pnode metadata requests and LMP feed windows.
  - Non-member plans exceeding the registered connection budget fail before any
    HTTP request is made.
  - Member account class permits larger bounded plans.
  - No new source feeds, pnodes, price components, outage semantics, topology
    links, or shared-cache publish behavior are approved by this ticket.
