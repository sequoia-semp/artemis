  - Fixture and live CLI command surfaces are available for PJM generation mix.
  - Generation mix artifacts publish through state packs and HotState.
  - No unit-level generation, emissions conversion, outage lifecycle semantics,
    topology links, or shared-cache policy changes are approved by this ticket.
