problem: >
  Direct PJM generation mix should be usable by analyst views through the
  accepted state pack and HotState read path without adding direct adapter calls
  to view builders or screens.
tasks:
  - Add deterministic generation-mix summary, drivers, current-day view, and evidence fields to the artifact builder.
  - Keep the source-specific pjm_generation_mix artifact as the authoritative product.
  - Add tests proving generation mix view context publishes through state packs and loads through HotState.
  - Add tests proving a current-day analyst view consumes generation mix context through HotState.
  - Document that generation mix view context is derived from accepted artifacts only.
acceptance_criteria:
  - Generation mix artifacts retain the source-specific pjm_generation_mix product unchanged.
  - View-ready generation mix fields are deterministic and source-backed by pjm_generation_mix.
  - A published state pack exposes generation mix current-day context through HotState.
  - The analyst current-day view can consume generation mix context through HotState merge.
  - No Textual screen, analyst view builder, or cache reader calls the PJM adapter directly.
  - No synthetic generation values, outage semantics, topology links, or cache mutation policy changes are introduced.
