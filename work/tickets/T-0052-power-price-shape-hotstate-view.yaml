problem: >
  Direct PJM price data should be usable by analyst views through accepted
  state packs and HotState, with derived daily shape prices remaining separate
  from authoritative hourly source LMP products.
tasks:
  - Add deterministic price-shape summary, drivers, current-day view, and evidence fields to the rollup artifact builder.
  - Keep hourly PJM LMP source products and derived daily shape products physically and semantically separate.
  - Add tests proving price shape view context publishes through state packs and loads through HotState.
  - Add tests proving a current-day analyst view consumes price shape context through HotState.
  - Document that read-path price shape context is derived from accepted artifacts only.
acceptance_criteria:
  - Price shape artifacts retain the power_price_shape_rollups product unchanged.
  - View-ready price shape fields are deterministic and lineage-backed by hourly authoritative source prices.
  - A published state pack exposes price shape current-day context through HotState.
  - The analyst current-day view can consume price shape context through HotState merge.
  - No Textual screen, analyst view builder, or cache reader calls the PJM adapter or re-runs rollup logic directly.
  - No synthetic prices, inferred shape fills, unapproved monthly/strip products, or cache mutation policy changes are introduced.
