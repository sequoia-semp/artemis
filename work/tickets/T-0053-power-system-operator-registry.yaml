problem: >
  Broader power-system abstraction needs a first-class operator identity so PJM
  can remain the first implementation without hardcoding PJM as the generic
  concept for all future ISO/RTO, balancing authority, source, calendar, and
  topology work.
tasks:
  - Add a generic power system operator schema and registry.
  - Add PJM as the first approved source-backed operator record.
  - Add cross-reference validation for source publications, power locations, feed descriptors, and operator-specific calendars.
  - Document the operator reference policy and non-PJM expansion boundary.
  - Add fail-closed tests for unknown operator references.
acceptance_criteria:
  - power_system_operators.yaml validates with duplicate-key protection and schema checks.
  - PJM is represented as an approved rto_iso operator with official source documents.
  - Existing PJM source, location, feed, and calendar registries resolve to the PJM operator.
  - Unknown operator references fail closed.
  - No non-PJM ingestion, non-PJM market convention, topology semantics, or cache mutation policy is approved by this ticket.
