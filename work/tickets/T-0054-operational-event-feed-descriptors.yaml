branch: codex/T-0054-operational-event-feed-descriptors
context_profile: trading_domain
problem: >
  Broader direct-PJM incorporation needs a power-system event source surface for
  outage and constraint publications without prematurely approving lifecycle,
  topology, or impact semantics.
tasks:
  - Add a generic operational event feed descriptor schema and registry.
  - Add PJM Data Miner candidate descriptors for forecast generation outages and transmission constraints.
  - Link candidate source-catalog publications to the operational event feed descriptors.
  - Extend source/operator cross-reference validation to include operational event feeds.
  - Add tests proving descriptors are candidate-only and fail closed on unknown descriptor references.
acceptance_criteria:
  - power_system_operational_event_feeds.yaml validates with duplicate-key protection and schema checks.
  - PJM outage and transmission-constraint source catalog entries resolve to candidate operational event feed descriptors.
  - Operational event descriptors resolve to the PJM power-system operator.
  - No operational event feed is approved for normalized artifacts or shared publish.
  - Unknown operational event descriptor references fail closed.
  - No outage lifecycle semantics, topology linkage, Gantt behavior, congestion attribution, or cache mutation policy is approved by this ticket.
required_tests:
  - .venv/bin/pytest tests/test_power_system_operational_events.py tests/test_power_system_operators.py tests/test_power_system_source_catalog.py
  - .venv/bin/pytest
  - .venv/bin/artemis validate --strict --ticket T-0054
