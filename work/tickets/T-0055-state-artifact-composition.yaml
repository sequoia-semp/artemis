problem: >
  Direct PJM source products need to compose into a single Morning State Pack
  artifact mapping without overwriting view fields or merging source-specific
  products ambiguously.
tasks:
  - Add deterministic artifact payload composition for multi-source state inputs.
  - Add a CLI command to compose artifact JSON files before build-state-pack.
  - Preserve separate source-specific products and known series lists.
  - Fail closed on ambiguous artifact key collisions.
  - Add HotState/view regression coverage for composed load, generation, and price context.
acceptance_criteria:
  - Load, generation, and price shape artifacts compose into one mapping with all view sections preserved.
  - Source lineage, drivers, deltas, evidence, and known series lists concatenate in input order.
  - Ambiguous source-product key collisions fail closed.
  - A composed artifact mapping can build/publish through the existing state-pack path and feed a current-day analyst view through HotState.
  - No accepted state mutation, synthetic value creation, source normalization change, or cache mutation policy is introduced.
