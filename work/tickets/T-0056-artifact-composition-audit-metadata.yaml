problem: >
  Composed multi-source PJM state artifacts need an auditable composition
  metadata block so the accepted state can prove which source products and view
  fields were assembled.
tasks:
  - Add generated artifact_composition metadata to composed payloads.
  - Record payload count, source-product keys, view fields, input keys, current-day view keys, and shared list counts.
  - Reject input payloads that attempt to supply the reserved artifact_composition key.
  - Document the metadata contract.
acceptance_criteria:
  - Composed artifacts include deterministic artifact_composition metadata.
  - Reserved metadata keys from input payloads fail closed.
  - Composition metadata survives state-pack publish and HotState view consumption.
  - No source normalization, publish behavior, accepted-state mutation, or cache mutation policy changes are introduced.
