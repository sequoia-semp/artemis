problem: >
  Candidate-only registered artifact products must not be accepted into Morning
  State Packs simply because their artifact mapping is schema-valid.
tasks:
  - Add publish-status validation for registered artifact product keys.
  - Invoke artifact product publish-status validation from state-pack validation.
  - Preserve existing behavior for unregistered legacy artifact keys.
  - Add regression tests proving candidate-only artifact products fail before publish.
  - Document the publish gate.
acceptance_criteria:
  - Registered approved artifact products can validate in state packs.
  - Registered candidate-only artifact products fail candidate state-pack validation.
  - Unregistered legacy artifact keys continue to validate under existing checks.
  - No source normalization, accepted-state mutation, or cache mutation policy changes are introduced.
