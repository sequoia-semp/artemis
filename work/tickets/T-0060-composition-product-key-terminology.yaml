problem: >
  Composition product keys include approved derived products, so calling them
  source-product keys weakens the source-vs-derived distinction.
tasks:
  - Rename composer product-key terminology to composition product keys.
  - Keep a compatibility alias for existing code imports.
  - Update artifact composition metadata tests and docs.
  - Add validation that stale legacy source_product_keys metadata fails when it conflicts with composition product keys.
acceptance_criteria:
  - New composed artifacts emit artifact_composition.composition_product_keys.
  - Registry validation compares artifact product composition keys against COMPOSITION_PRODUCT_KEYS.
  - Source-product terminology in docs no longer describes derived composition products.
  - Existing compatibility import SOURCE_PRODUCT_KEYS remains available.
  - No publish behavior, source normalization, or cache policy changes are introduced.
