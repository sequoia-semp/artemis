context_profile: trading_domain
problem: >
  Direct PJM source products are now modeled across load, prices, generation
  mix, and derived shape rollups, but retention and publish policy are not
  executable at the artifact-product layer.
tasks:
  - Add a generic power-system artifact retention policy schema and registry.
  - Cover every registered artifact product with exactly one retention policy.
  - Validate retention policies against artifact products and operators.
  - Enforce lineage and source-specific separation for publishable source products.
  - Keep candidate operational event descriptors blocked from state-pack publish.
  - Document retention policy behavior and PJM-first binding.
acceptance_criteria:
  - Registry validation includes power_system_artifact_retention_policies.yaml with no strict warnings.
  - Every artifact product has a retention policy.
  - Retention policy product family, operator, commodity, and publish status match artifact products.
  - Publishable artifacts require lineage.
  - Publishable source products require source-specific separation.
  - Candidate operational event descriptors cannot allow state-pack publish.
  - PJM load fundamentals preserve latest forecast curve and revision-history separation.
required_tests:
  - .venv/bin/pytest tests/test_power_system_retention.py tests/test_power_system_artifact_products.py tests/test_native_validation_runner.py
  - .venv/bin/pytest
