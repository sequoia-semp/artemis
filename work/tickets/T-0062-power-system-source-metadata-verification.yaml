context_profile: trading_domain
problem: >
  Direct PJM fundamentals and price ingestion should fail before normalization
  when source feed definitions no longer expose registry-required fields.
tasks:
  - Add connector support for fetching PJM Data Miner feed definitions.
  - Add a generic power-system source metadata expectation service.
  - Derive PJM Data Miner expectations from fundamental, price, and generation mix feed registries.
  - Verify source definition payloads against required registry fields.
  - Add native validation coverage that approved source catalog feeds have metadata expectations.
  - Document source metadata verification behavior.
acceptance_criteria:
  - PJM Data Miner definition fetches do not send API credentials.
  - Metadata expectations include approved PJM load, pnode, hourly LMP, and generation mix feeds.
  - Definition verification fails closed when required fields are missing.
  - Approved source catalog feed IDs without metadata expectations fail validation.
  - Candidate feeds are not promoted by metadata verification.
  - No state-pack or cache payload contract changes are introduced.
