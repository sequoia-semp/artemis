problem: >
  Direct PJM ingestion needs an operator-facing metadata verification report
  before broader live source pulls are relied on.
tasks:
  - Add multi-feed PJM Data Miner definition verification reports.
  - Select approved core metadata expectations by default.
  - Allow explicit feed selection by Data Miner feed name or registry feed ID.
  - Add fixture-backed and opt-in live CLI verification paths.
  - Expose the verifier through Artemis data-sources commands.
  - Document command behavior and candidate-feed guardrails.
acceptance_criteria:
  - Fixture metadata verification writes a report with verified feed counts.
  - Live metadata verification is opt-in and uses Data Miner definition fetches.
  - Explicit feed selection works without requiring unrelated definition payloads.
  - Candidate feeds are excluded by default and can only be included for inspection.
  - Missing required fields fail closed with a structured exception.
  - No source feed, state-pack, or cache publish semantics are changed.
