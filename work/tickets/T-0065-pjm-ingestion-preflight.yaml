problem: >
  Direct PJM source workflows need a readiness report before live ingestion so
  operators can see credential, feed, metadata, access-policy, and query-plan
  blockers without fetching source observations or publishing state.
tasks:
  - Add a non-mutating PJM ingestion preflight service.
  - Report credential presence without exposing secrets.
  - Report selected load, price, pnode, generation mix, and metadata feeds.
  - Reuse source access policy and hourly LMP query planning.
  - Expose the preflight through PGA and Artemis data-sources CLI surfaces.
  - Document the preflight boundary.
acceptance_criteria:
  - Missing key/date-window/pnode prerequisites produce readiness blockers.
  - Bounded account-class query plans produce ready reports.
  - Over-budget query plans produce blockers, not hidden policy bypasses.
  - CLI reports never include the PJM API key value.
  - The command does not fetch source observations or publish state.
  - No source feed, state-pack, or cache contract is changed.
required_tests:
  - .venv/bin/pytest tests/test_power_system_preflight.py tests/test_source_access_policies.py tests/test_source_query_plans.py
  - .venv/bin/pytest
  - .venv/bin/artemis validate --strict --ticket T-0065
