problem: >
  Power-system ingestion bundles should carry redacted preflight evidence so
  direct PJM source bundles preserve readiness context without exposing secrets
  or changing publish behavior.
tasks:
  - Add optional preflight evidence to bundle metadata.
  - Redact credential evidence and reject unredacted preflight claims.
  - Allow fixture-backed bundles to attach a preflight report.
  - Require ready preflight evidence for live PJM bundle fetches.
  - Document bundle/preflight evidence behavior.
acceptance_criteria:
  - Bundle metadata can include redacted preflight evidence.
  - Embedded preflight evidence never stores raw credential values.
  - "`--preflight-input` attaches fixture/offline preflight evidence."
  - "`--require-ready-preflight` blocks fixture bundles with blocked preflight reports."
  - Live bundles build and require ready preflight before fetching source observations.
  - No state-pack, cache, source feed, or publish contract is changed.
