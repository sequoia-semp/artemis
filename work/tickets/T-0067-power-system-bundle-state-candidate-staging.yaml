problem: >
  Power-system artifact bundles need a candidate-only state-pack staging path
  that validates the bundle through existing state-pack checks without
  publishing accepted state.
tasks:
  - Add a generic bundle-to-candidate state staging service.
  - Validate bundle metadata before building a candidate state pack.
  - Add PGA and Artemis candidate staging commands without publish flags.
  - Prove staging does not update current.json or create accepted state.
  - Document the candidate staging boundary.
acceptance_criteria:
  - Valid bundles can stage candidate state packs.
  - Invalid bundles fail before candidate state creation.
  - Staged candidates include bundle metadata and manifest input lineage.
  - Staging commands do not publish state or update current.json.
  - Existing state publisher remains the only accepted-state publish path.
  - No source feed, cache, or accepted-state contract is changed.
