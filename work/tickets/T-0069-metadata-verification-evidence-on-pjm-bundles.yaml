branch: codex/T-0069-metadata-verification-evidence-on-pjm-bundles
context_profile: trading_domain
problem: >
  PJM morning bundles and candidate-only pipeline runs should carry compact,
  redacted evidence that selected authoritative Data Miner definitions were
  verified before live source observations were fetched.
tasks:
  - Add compact metadata verification evidence to power-system bundle metadata.
  - Require live PJM morning bundle and pipeline runs to verify selected source definitions before source observation fetches.
  - Allow fixture-backed bundle runs to attach metadata verification evidence from fixture definitions.
  - Fail offline bundle builds when metadata verification is explicitly required and no metadata input is supplied.
  - Document the metadata evidence boundary and live-source gate.
acceptance_criteria:
  - Bundle metadata can include compact source metadata verification evidence without raw definition payloads.
  - Bundle validation rejects metadata verification evidence that claims to contain secret values.
  - Live PJM bundle and pipeline runs verify selected load, generation, pnode, and LMP definitions before fetching observations.
  - Fixture-backed bundle runs can use `--metadata-input`.
  - Fixture-backed bundle runs with `--require-metadata-verification` fail closed without metadata input.
  - No accepted-state publish path, cache contract, or source semantic approval is changed.
required_tests:
