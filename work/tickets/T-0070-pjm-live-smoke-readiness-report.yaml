problem: >
  Operators need a narrow, non-mutating smoke command that verifies direct PJM
  Data Miner readiness with redacted evidence before a full bundle or candidate
  pipeline run.
tasks:
  - Add a reusable PJM live smoke service with preflight, metadata verification, and bounded source row checks.
  - Expose the smoke service through root and Artemis data-source CLI commands.
  - Use the credentialed PJM Data Miner metadata API for live metadata verification.
  - Keep smoke reports redacted and free of raw source rows or credential values.
  - Document the live smoke boundary.
acceptance_criteria:
  - Smoke reports include redacted preflight evidence.
  - Smoke reports include compact source metadata verification evidence.
  - Successful smoke reports can fetch one bounded row for load, pnode metadata, hourly LMP, and generation mix.
  - Blocked smoke reports do not fetch source rows.
  - The command supports metadata-only mode.
  - No accepted-state publish path, shared cache, or source semantic approval is changed.
