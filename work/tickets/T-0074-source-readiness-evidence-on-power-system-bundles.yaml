context_profile: trading_domain
problem: >
  PJM morning bundles should be able to carry compact, redacted source readiness
  evidence from the generic power-system readiness contract and optionally fail
  closed when that evidence is missing or blocked.
tasks:
  - Add compact source readiness evidence to power-system bundle metadata.
  - Validate readiness input against the generic source readiness schema before bundle writes.
  - Add PJM bundle CLI flags for source readiness input and required-ready gating.
  - Document the bundle/readiness evidence boundary.
acceptance_criteria:
  - Bundles can embed compact source readiness evidence without raw rows or credentials.
  - Bundle validation rejects source readiness evidence that claims to contain secret values.
  - PJM bundle builds with `--require-ready-source-readiness` fail when readiness input is missing.
  - PJM bundle builds with `--require-ready-source-readiness` fail when readiness input is blocked.
  - No accepted-state publish path, shared cache, or source semantic approval is changed.
