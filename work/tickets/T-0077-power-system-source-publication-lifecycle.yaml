implementation_summary: >
  Added generic publication lifecycle semantics to the power-system source
  catalog and seeded PJM Data Miner entries with cadence, finality, revision,
  retention, and authoritative-use classifications. Approved source
  publications now fail validation when lifecycle semantics remain unresolved.
