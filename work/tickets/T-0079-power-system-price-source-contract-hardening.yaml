context_profile: trading_domain
problem: >
  Direct PJM hourly LMP data is now source-backed, but the generic
  power-system price feed descriptors did not yet make row-version filtering,
  UTC delivery windows, pnode promotion requirements, and LMP component coverage
  executable as source-product contract rules.
tasks:
  - Extend the generic power-system price feed schema with source-product
    contract semantics.
  - Seed PJM pnode, day-ahead hourly LMP, and real-time hourly LMP descriptors
    with contract policies.
  - Add validation that approved hourly LMP feeds require UTC delivery starts,
    current-row filters, row version numbers, full source component coverage,
    and approved pnode promotion semantics.
  - Include price source contract validation in strict power-system reference
    validation.
  - Add regression tests and update price-domain documentation.
acceptance_criteria:
  - Price feed registry validates with source-product contract fields.
  - Approved PJM hourly LMP feeds fail closed if row-current filtering,
    component coverage, UTC delivery windows, or promotion policy is weakened.
  - PJM pnode metadata remains effective-dated metadata and does not become a
    price observation product.
  - Source LMP components remain source-specific; exchange/trading product
    expansion is not approved by this ticket.
  - State-pack publish behavior and HotState read path remain unchanged.
required_tests:
