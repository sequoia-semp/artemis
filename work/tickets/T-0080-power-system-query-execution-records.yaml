problem: >
  PJM hourly LMP query planning counted bounded requests, but executable request
  construction still lived in CLI helper code. Broader power-system source
  integration needs deterministic query execution records before adapters make
  live calls.
tasks:
  - Add source query request records with feed IDs, source feed names, pnodes,
    date windows, query parameters, pagination bounds, and plan lineage.
  - Build deterministic PJM hourly LMP request records from the approved source
    query plan.
  - Add compact redacted query execution summaries.
  - Wire PJM hourly LMP live fetches to execute planned request records.
  - Remove CLI-local PJM hourly LMP query construction.
  - Add regression tests and documentation for the query execution boundary.
acceptance_criteria:
  - PJM hourly LMP request records exactly match the approved query-plan request
    budget.
  - Request records include pnode metadata requests and per-feed/per-window LMP
    source-row requests.
  - Built LMP queries preserve current-row filters, UTC date ranges, pnode IDs,
    fields, pagination limits, and query-plan lineage.
  - Live PJM LMP fetches execute planned records and attach compact query
    request/execution evidence to `DataRequest` parameters.
  - Query execution summaries contain no secrets.
  - State-pack publish behavior and HotState read path remain unchanged.
