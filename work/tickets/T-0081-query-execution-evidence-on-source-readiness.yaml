branch: codex/T-0081-query-execution-evidence-on-source-readiness
context_profile: trading_domain
problem: >
  Source readiness reports carried source fetch statuses, but they did not yet
  preserve the query execution evidence produced by approved source query plans.
  That left the readiness and bundle boundary weaker than the live request
  planning layer.
tasks:
  - Extend the generic source readiness schema with optional query execution
    evidence.
  - Add redacted query execution summaries to PJM live smoke reports when source
    rows are fetched.
  - Execute PJM live smoke pnode and hourly LMP source checks through planned
    query request records.
  - Preserve compact query execution evidence when source readiness is embedded
    into power-system bundle metadata.
  - Include query execution evidence in pipeline source-readiness summaries when
    present.
  - Add regression tests and documentation for readiness and bundle boundaries.
acceptance_criteria:
  - "Source readiness reports may carry query execution summaries with plan ID,
    request counts, account class, request kinds, feed IDs, pnodes, date
    windows, and `contains_secret_values: false`."
  - PJM live smoke pnode/LMP fetches execute planned query request records and
    attach matching query execution summaries to request parameters.
  - Bundle metadata preserves only compact redacted query execution evidence.
  - Unredacted query execution evidence fails closed.
  - Existing fixture readiness inputs without query execution evidence remain
    accepted.
  - State-pack publish behavior and HotState read path remain unchanged.
required_tests:
