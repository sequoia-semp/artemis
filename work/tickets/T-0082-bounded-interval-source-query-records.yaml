branch: codex/T-0082-bounded-interval-source-query-records
context_profile: trading_domain
problem: >
  PJM hourly LMP live pulls used deterministic query execution records, but PJM
  load and generation live pulls still constructed bounded Data Miner queries in
  CLI and smoke helpers. Broader power-system source integration needs a shared
  request-record pattern for simple interval feeds too.
tasks:
  - Add bounded interval source query request builders for PJM load and
    generation-by-fuel surfaces.
  - Enforce PJM Data Miner row-count and pagination policy for bounded interval
    request records.
  - Wire live PJM load and generation fetches to execute planned request
    records.
  - Wire live smoke load and generation checks to planned request records.
  - Add regression tests and update source-catalog documentation.
acceptance_criteria:
  - PJM load query requests include registry feed ID, Data Miner feed, date
    window, area filter when configured, row/page bounds, request ID, and
    redacted query execution summary.
  - PJM generation query requests include registry feed ID, Data Miner feed,
    date window, fuel/value fields, row/page bounds, request ID, and redacted
    query execution summary.
  - Bounded interval builders reject row counts outside the source access
    policy.
  - Live CLI helpers for PJM load and generation execute request records instead
    of constructing source queries inline.
  - State-pack publish behavior and HotState read path remain unchanged.
required_tests:
