branch: codex/T-0083-registry-backed-bounded-query-plans
context_profile: trading_domain
problem: >
  PJM load and generation bounded interval request records existed in service
  code, but the plan IDs, applicable feeds, date-window mode, and publication
  lineage were not yet represented in the generic power-system query-plan
  registry.
tasks:
  - Extend the power-system source query plan schema for generic bounded
    interval plans and non-pnode query dimensions.
  - Add approved PJM Data Miner bounded interval plan records for load and
    generation-by-fuel.
  - Make bounded interval request builders consume registry records for feed
    applicability, publication lineage, access policy, and date-window bounds.
  - Add regression tests for registry lineage and unsupported-feed rejection.
  - Update source catalog documentation for registry-backed bounded plans.
acceptance_criteria:
  - Power-system query plans can represent both daily chunked LMP requests and
    bounded interval fundamentals requests.
  - PJM load bounded plans list the four approved load feed descriptors and
    preserve source publication lineage.
  - PJM generation mix bounded plans list `PJM_GEN_BY_FUEL` and preserve source
    publication lineage.
  - Bounded request builders reject feeds outside the approved registry plan
    before constructing Data Miner requests.
  - State-pack publish behavior and HotState read path remain unchanged.
required_tests:
