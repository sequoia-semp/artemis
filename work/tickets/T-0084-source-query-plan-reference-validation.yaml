context_profile: trading_domain
problem: >
  Power-system source query plans validated their JSON schema shape, but strict
  validation did not yet prove that plan publication IDs and applicable feed
  IDs resolved to source catalog records and normalized feed descriptors.
tasks:
  - Add query-plan cross-reference validation for source publications and feed
    descriptors.
  - Support multi-publication bounded plans by requiring each feed to have
    source publication coverage rather than forcing every feed under one
    primary publication.
  - Wire query-plan reference validation into the strict power-system reference
    gate.
  - Add regression tests for resolved references and fail-closed unknown
    publication/feed cases.
acceptance_criteria:
  - Strict validation fails when a query plan references an unknown source
    publication.
  - Strict validation fails when a query plan applies to an unknown feed
    descriptor.
  - Load bounded interval plans can span load actual and load forecast
    publications while still proving every feed has source-publication coverage.
  - State-pack publish behavior and HotState read path remain unchanged.
required_tests:
  - .venv/bin/pytest tests/test_source_query_plans.py tests/test_native_validation_runner.py
  - .venv/bin/pytest
  - .venv/bin/artemis validate --strict --ticket T-0084
