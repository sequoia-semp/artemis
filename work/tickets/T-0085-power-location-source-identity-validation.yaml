problem: >
  Direct PJM price ingestion depends on approved power locations resolving to
  official PJM pnode identities, but strict validation did not yet prove that
  approved power locations carried complete, verified source identity metadata.
tasks:
  - Add a generic power-location source identity validation service.
  - Require approved PJM power locations to carry official Data Miner pnode ID,
    name, type, and verified source status.
  - Reject duplicate PJM pnode mappings across approved power locations.
  - Wire the validation into the strict power-system reference gate.
  - Add regression tests and documentation.
acceptance_criteria:
  - Approved PJM power locations expose a validated source identity policy for
    official Data Miner pnodes.
  - Missing verified PJM pnode source status fails closed.
  - Duplicate approved PJM pnode-to-location mappings fail closed.
  - Existing pnode fixture verification and price artifact behavior remain
    unchanged.
  - State-pack publish behavior and HotState read path remain unchanged.
