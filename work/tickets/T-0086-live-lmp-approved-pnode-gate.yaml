problem: >
  Live PJM LMP fetches accepted raw pnode IDs and relied on later canonical
  price-surface conversion to reject unsupported pnodes. Direct PJM ingestion
  should fail before query planning when a requested pnode is not part of the
  approved power-location universe.
tasks:
  - Expose approved PJM pnode IDs from the power-location source identity
    validator.
  - Validate raw live `--pnode-id` arguments against approved power locations
    before building Data Miner request records.
  - Preserve location shorthand behavior for approved mapped locations.
  - Add regression tests for approved and unsupported raw pnode IDs.
acceptance_criteria:
  - Raw approved PJM pnode IDs can still be used for live LMP fetch planning.
  - Raw unsupported PJM pnode IDs fail closed before Data Miner request records
    are built.
  - Location-based live LMP fetch planning remains unchanged.
  - State-pack publish behavior and HotState read path remain unchanged.
required_tests:
  - .venv/bin/pytest tests/test_power_system_price_core.py
  - .venv/bin/pytest
  - .venv/bin/artemis validate --strict --ticket T-0086
