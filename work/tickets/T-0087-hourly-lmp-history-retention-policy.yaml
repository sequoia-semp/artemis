  - Add generic historical source policy fields to power-system artifact
    retention policies.
  - Register PJM hourly LMP history as source-restorable through the approved
    hourly LMP query plan.
  - Encode the 1d, 5d, 10d, and 30d heatmap windows in retention policy.
  - Validate query-plan references, hot-history bounds, and PJM row-version
    policy.
  - Add regression tests and documentation.
acceptance_criteria:
  - "`pjm_power_prices` retention names `PJM_DATAMINER_HOURLY_LMP_DAILY_CHUNKS`
    as the approved source-restoration query plan."
  - "`pjm_power_prices` retention encodes 1d, 5d, 10d, and 30d heatmap windows."
  - Unknown historical query-plan references fail closed.
  - Derived view windows beyond the approved hot history horizon fail closed.
  - State-pack publish behavior and HotState read path remain unchanged.
