context_profile: trading_domain
problem: >
  Forward price heatmap defaults matched the PJM hourly LMP retention windows,
  but the builder and CLI still used local defaults instead of reading the
  machine-readable retention policy.
tasks:
  - Add retention-policy lookup for heatmap history windows.
  - Keep explicit history-day overrides compatible for direct service callers.
  - Wire CLI heatmap builds to pass the registry directory into the heatmap
    builder.
  - Add regression tests for policy-backed history windows and CLI parsing.
acceptance_criteria:
  - Forward price heatmap history windows can be read from
    `pjm_power_prices.historical_source_policy.derived_view_windows_days`.
  - Existing default heatmap behavior remains 1d, 5d, 10d, and 30d.
  - CLI heatmap commands expose a registry path for retention-backed windows.
  - State-pack publish behavior and HotState read path remain unchanged.
required_tests:
  - .venv/bin/pytest tests/test_forward_price_heatmap.py tests/test_power_system_retention.py
  - .venv/bin/pytest
  - .venv/bin/artemis validate --strict --ticket T-0088
