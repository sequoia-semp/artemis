problem: >
  Analyst view builds could merge accepted HotState artifacts, but still
  required an input JSON file. Production analyst views should be able to read
  accepted state directly without fixture/file input.
tasks:
  - Make analyst view input optional when a state root is provided.
  - Use the accepted state-pack as_of date when no input payload supplies one.
  - Preserve input-file override behavior when both input and HotState are
    supplied.
  - Add regression tests and user documentation.
acceptance_criteria:
  - Analyst current-day views can build from accepted HotState artifacts without
    an input file.
  - Missing input and missing state root fail closed with a structured
    exception.
  - Existing file-plus-HotState merge behavior remains unchanged.
  - State-pack publish behavior remains unchanged.
