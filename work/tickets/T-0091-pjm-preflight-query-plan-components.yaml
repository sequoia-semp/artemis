problem: >
  PJM ingestion preflight reported hourly LMP query-plan evidence, but not the
  bounded interval query plans for load and generation mix. Direct PJM source
  readiness should expose planned request counts for every selected approved
  source surface before live fetches.
tasks:
  - Add preflight query-plan summaries for selected PJM load feeds.
  - Add preflight query-plan summaries for PJM generation mix when enabled.
  - Preserve the legacy hourly LMP `query_plan` field for compatibility while
    adding a `query_plans` mapping.
  - Add regression tests and documentation.
acceptance_criteria:
  - Preflight reports include load, price, and generation_mix query-plan
    summaries when all surfaces are selected.
  - Preflight can omit generation mix and then omits its query-plan component.
  - Existing hourly LMP `query_plan` behavior remains compatible.
  - Preflight remains non-mutating and does not fetch source rows.
