problem: >
  Direct PJM live fetches normalized source rows into artifacts but did not
  retain a generic, redacted acquisition manifest proving what bounded source
  requests were executed and what result counts were received.
tasks:
  - Add a generic power-system raw source fetch manifest schema.
  - Add deterministic manifest construction with raw-record hashing and no raw
    rows or credential values.
  - Attach manifests to PJM live load, generation mix, and LMP artifact builds.
  - Preserve existing fixture-backed artifact shapes.
  - Document the manifest boundary as evidence, not a source product.
acceptance_criteria:
  - Raw fetch manifests validate against a schema.
  - Manifests include request/result metadata and raw-record hashes.
  - Manifests explicitly mark raw rows and secret values absent.
  - PJM live build helpers can produce manifests without changing existing
    helper return contracts.
  - Fixture builds do not synthesize manifests.
  - No state-pack publish semantics change.
