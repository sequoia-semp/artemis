branch: codex/T-0094-source-publication-publish-gate
context_profile: trading_domain
problem: >
  Direct PJM bundles could carry source publication evidence showing candidate
  or non-approved source publications, but accepted state-pack publish did not
  explicitly block production promotion based on that evidence.
tasks:
  - Add a publish-time source-publication status gate.
  - Block production-like accepted-state publish for candidate or non-approved
    source publications.
  - Preserve candidate staging and local fixture/test/development validation
    workflows.
  - Document the accepted-state boundary.
acceptance_criteria:
  - Candidate staging still accepts valid bundles with source publication
    evidence.
  - Production accepted-state publish blocks candidate source publications.
  - Fixture/local accepted-state publish remains allowed for local validation.
  - Failed publish preserves the candidate and does not update current state.
  - Existing artifact-product and synthetic publish gates remain intact.
required_tests:
  - .venv/bin/pytest tests/test_power_system_state.py
  - .venv/bin/pytest tests/test_power_system_source_catalog.py
  - .venv/bin/pytest
  - .venv/bin/artemis validate --strict --ticket T-0094
