problem: >
  PJM load actual feeds had candidate descriptors and some metadata evidence,
  but there was no explicit promotion-readiness report distinguishing metadata
  verification from source-row evidence and source-publication authority.
tasks:
  - Add a generic source feed approval report schema.
  - Add PJM load actual approval assessment for metered and preliminary load.
  - Require metadata verification, source-row evidence, approved feed status,
    and authoritative source publication lifecycle before approval.
  - Keep current candidate feeds blocked with structured reasons.
  - Document the load actual approval boundary.
acceptance_criteria:
  - Current candidate PJM load actual feeds are not approved by the readiness
    report even with metadata and row evidence.
  - Metadata verification and source-row evidence are reported separately.
  - A patched registry with approved feed and publication statuses can pass the
    approval report.
  - Unredacted evidence fails closed.
  - No registry feed status is promoted in this pass.
