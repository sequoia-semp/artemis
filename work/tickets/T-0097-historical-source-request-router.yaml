context_profile: trading_domain
problem: >
  Retention policies declared source-restorable artifacts, approved query
  plans, and derived view windows, but there was no deterministic router that
  converted those policies into compact source request plans without fetching.
tasks:
  - Add a generic historical source request router driven by artifact retention
    policies.
  - Bind PJM hourly LMP, load fundamentals, and generation mix artifacts to
    existing approved query planners.
  - Keep derived shape products non-source-restorable.
  - Exclude candidate PJM load actual feeds from default historical load
    routing.
  - Document the router boundary.
acceptance_criteria:
  - PJM LMP history routes to the approved daily chunk query plan and 30-day
    window.
  - PJM load fundamentals history routes only approved load forecast feeds by
    default.
  - PJM generation mix routes to its approved bounded query plan.
  - Non-source-restorable products fail closed.
  - Router emits no raw rows or secret values and performs no live fetch.
required_tests:
  - .venv/bin/pytest tests/test_historical_source_router.py
  - .venv/bin/pytest tests/test_power_system_retention.py
  - .venv/bin/pytest
