problem: >
  PJM five-minute real-time LMP was cataloged as a candidate source publication
  but lacked a concrete candidate feed descriptor and query-plan record, making
  future planning less explicit while still needing to block promotion.
tasks:
  - Add candidate five-minute RT LMP feed descriptor support to the price-feed
    schema.
  - Register `PJM_RT_FIVE_MINUTE_LMP` as candidate metadata only.
  - Link the candidate feed to the existing five-minute source publication.
  - Add a candidate query-plan record for planning/reference validation only.
  - Block candidate price feeds from normalization into canonical artifacts.
  - Document the candidate-only boundary.
acceptance_criteria:
  - Registry validation accepts the candidate five-minute feed descriptor.
  - Source catalog links the candidate source publication to the candidate feed.
  - Query-plan reference validation resolves the candidate plan and feed.
  - Metadata expectations include the candidate feed when candidates are
    requested but default approved-core metadata excludes it.
  - Candidate five-minute feed normalization fails closed.
  - No live fetch, publish, or HotState behavior is enabled for five-minute LMP.
