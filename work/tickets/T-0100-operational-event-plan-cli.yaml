problem: >
  The operational event candidate plan could be built from services, but users
  had no read-only command to produce the validated PJM outage and constraint
  readiness artifact during source-planning work.
tasks:
  - Add a CLI command that builds and validates the operational event candidate
    plan.
  - Expose the command through both legacy pga and Artemis data-source command
    surfaces.
  - Keep candidate-only plans successful by default and add an explicit
    require-approved gate for future promotion checks.
  - Document the read-only command boundary.
acceptance_criteria:
  - The CLI writes a schema-validated candidate plan without fetching source rows.
  - The Artemis data-source parser exposes the command.
  - The default command exits successfully for the current candidate-only plan.
  - The require-approved flag fails closed while still writing the report.
  - No source adapter, publish, state-pack, cache, or HotState behavior changes.
required_tests:
