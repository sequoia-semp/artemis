problem: >
  PJM morning source bundles carried preflight, metadata, source-readiness, and
  source-publication evidence, but did not yet preserve the operational-event
  candidate plan blockers for outages and constraints.
tasks:
  - Add compact operational-event candidate-plan evidence to generic
    power-system artifact bundle metadata.
  - Add PJM bundle CLI flags for attaching a generated or prior validated plan.
  - Add an explicit require-approved gate that fails closed for current
    candidate-only operational-event feeds.
  - Document that embedded operational-event evidence does not approve source
    fetch, normalization, topology, HotState, cache, or publish behavior.
acceptance_criteria:
  - Bundles can embed compact operational-event plan evidence with blockers.
  - Bundle validation rejects operational-event evidence that claims to contain
    secret values.
  - PJM morning bundle CLI can include the generated candidate plan.
  - Required-approved operational-event gating fails for the current PJM
    candidate-only plan.
  - Pipeline reports summarize attached operational-event plan evidence when
    present.
  - No operational-event source rows are fetched or normalized.
