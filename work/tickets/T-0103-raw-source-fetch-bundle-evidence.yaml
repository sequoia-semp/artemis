problem: >
  Live source bundles could include raw source fetch manifests as evidence
  payloads, but bundle metadata and pipeline reports did not summarize those
  manifests for source review.
tasks:
  - Add compact raw source fetch manifest evidence to generic power-system
    bundle metadata.
  - Fail closed if raw fetch evidence claims to contain raw records or secrets.
  - Add pipeline summary output for raw source fetch evidence when present.
  - Document the redacted raw-fetch evidence boundary.
acceptance_criteria:
  - Bundle metadata records manifest counts, total row/page counts, source
    surface counts, registry feed IDs, query-plan IDs, and per-manifest hashes.
  - Raw rows and credential values remain excluded from metadata evidence.
  - Bundle validation rejects unredacted raw-fetch evidence.
  - Pipeline reports summarize raw source fetch evidence when present.
  - No source adapter, normalization, state-pack publish, cache, or HotState
    behavior changes.
