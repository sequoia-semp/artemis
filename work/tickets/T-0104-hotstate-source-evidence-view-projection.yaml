problem: >
  Power-system bundles preserved source-audit metadata in accepted state, but
  Analyst views did not project that metadata into view evidence through the
  HotState read path.
tasks:
  - Add a generic read-only projection from power-system bundle metadata to
    Analyst view evidence entries.
  - Include preflight, metadata verification, source readiness, source
    publications, raw source fetches, and operational event candidate-plan
    summaries when present.
  - Keep projection compact and redacted.
  - Document that Analyst views read this evidence through HotState and do not
    call PJM adapters or raw source rows.
acceptance_criteria:
  - Analyst view builds from accepted HotState include compact source evidence
    derived from `power_system_artifact_bundle` metadata.
  - Projection includes source readiness, raw fetch, and operational event
    blocker counts when present.
  - Projection does not expose raw source rows, error messages, request headers,
    or credential values.
  - Supplied input and HotState read boundaries remain unchanged.
  - No source adapter, state-pack publish, cache mutation, or UI behavior
    changes.
