branch: codex/T-0105-power-system-source-audit-report
context_profile: trading_domain
problem: >
  Source-audit evidence was embedded in bundles, pipeline reports, and Analyst
  view evidence, but there was no standalone generic report for inspecting a
  bundle or accepted HotState source posture.
tasks:
  - Add a generic power-system source audit schema.
  - Add a deterministic service that summarizes redacted bundle metadata.
  - Expose a read-only CLI command for bundle-file and HotState inputs.
  - Document the read-only source-audit workflow.
acceptance_criteria:
  - Audit reports validate against schema.
  - Audit reports summarize preflight, metadata verification, source readiness,
    source publications, raw fetch evidence, and operational-event plan evidence
    when present.
  - Raw source rows, request headers, credential values, and source error
    messages are not emitted.
  - CLI can read either a workspace bundle JSON or accepted HotState artifacts.
  - Blocked source posture returns non-zero unless `--allow-blockers` is
    supplied.
  - No source adapter, normalization, state-pack publish, cache mutation, or UI
    behavior changes.
required_tests:
  - .venv/bin/pytest tests/test_power_system_source_audit.py tests/test_power_system_state.py tests/test_analyst_views.py
  - .venv/bin/pytest
  - .venv/bin/artemis validate --strict --ticket T-0105
