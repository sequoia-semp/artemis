problem: >
  Approved hourly PJM LMP feeds declared UTC hourly delivery windows, but row
  normalization did not explicitly reject non-hourly UTC starts or
  contradictions between PJM Data Miner UTC and EPT delivery-start fields.
tasks:
  - Add exact UTC-hour delivery-start validation for approved hourly LMP rows.
  - Validate PJM EPT delivery-start fields against the UTC instant.
  - Preserve current-row, component, pnode identity, and effective-date gates.
  - Document the source timestamp consistency requirement.
acceptance_criteria:
  - Non-hourly UTC delivery starts fail before source observations are built.
  - PJM EPT timestamps that do not map to the UTC delivery instant fail closed.
  - Valid summer and winter PJM EPT/UTC offsets normalize successfully.
  - Candidate five-minute LMP remains non-promotable.
  - No source adapter, state-pack, cache, HotState, or publish behavior changes.
