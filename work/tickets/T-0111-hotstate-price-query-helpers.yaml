problem: >
  Analyst and heatmap code could read accepted price_surface_points from
  HotState artifacts, but there was no explicit query helper separating
  source-published price points from derived shape products.
tasks:
  - Add HotState price_surface_points filtering helpers.
  - Add source_price_points and derived_price_shape_points read paths.
  - Update heatmap HotState reads to use the helper instead of direct artifact
    access.
  - Document the accepted-state price read path boundary.
  - Add regression coverage for source versus derived price-point separation.
acceptance_criteria:
  - HotState can return all accepted price-surface points as typed
    PriceSurfacePoint records.
  - HotState can filter by commodity, location, source_role, and source
    artifact lineage.
  - Source-published points and derived shape points remain separate.
  - Heatmap CLI still reads accepted price points through HotState.
  - No source adapter, normalization, state-pack publish, or cache mutation
    behavior changes.
