problem: >
  Accepted PJM load and generation mix artifacts could feed Analyst views
  through merged artifact dictionaries, but there was no explicit HotState query
  helper separating source-specific fundamental products from best-series
  products.
tasks:
  - Add HotState source fundamental record query helpers.
  - Add HotState best-series fundamental record query helpers.
  - Add HotState generation mix observation queries.
  - Document the accepted-state fundamental read path boundary.
  - Add regression coverage for source versus best-series separation.
acceptance_criteria:
  - HotState can return source-specific load actual, forecast, and revision
    records without mixing them with best-series records.
  - HotState can return best-series load records without mixing them with
    source products.
  - HotState can return typed generation mix observations by location and fuel.
  - Analyst/UI documentation names HotState as the read path for accepted
    fundamentals.
  - No source adapter, normalization, state-pack publish, or cache mutation
    behavior changes.
