context_profile: trading_domain
problem: >
  Accepted fundamental and derived price-shape artifacts carried explicit gaps,
  but HotState did not expose a read helper for Analyst or UI paths to retrieve
  those gaps without re-parsing artifact-specific payloads.
tasks:
  - Add a generic HotState artifact_gaps helper.
  - Add fundamental, generation mix, and price-shape gap convenience helpers.
  - Preserve source artifact, location, and reason filters.
  - Document that explicit gaps must not be filled with synthetic values.
  - Add regression coverage for fundamental and price-shape gaps.
acceptance_criteria:
  - HotState returns accepted fundamental coverage gaps with source artifact
    labels.
  - HotState returns accepted derived price-shape gaps with source artifact
    labels.
  - HotState filters gaps by location and reason.
  - Invalid gap payloads fail closed.
  - No source adapter, normalization, state-pack publish, or cache mutation
    behavior changes.
