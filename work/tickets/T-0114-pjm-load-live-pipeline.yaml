problem: >
  The workbench could fetch PJM load artifacts and could stage broader morning
  bundles, but it did not have a narrow live-load pipeline that proves one
  approved PJM feed can move through source readiness, artifact bundling,
  candidate staging, publishing, and HotState consumption.
tasks:
  - Add a load-only live pipeline command for approved PJM load forecast data.
  - Default the pipeline to the approved load_frcstd_7_day feed.
  - Embed metadata verification, source readiness, raw source fetch, and source
    publication evidence in the bundle.
  - Stage the bundle as a candidate state pack and support optional publish.
  - Add regression coverage through HotState.
  - Document the operational command.
acceptance_criteria:
  - The command fetches PJM load rows through the Data Miner connector.
  - The command validates metadata, source-readiness, raw-fetch, and
    fundamental-state artifacts before staging.
  - Production publish succeeds only for approved feeds with matching evidence.
  - Published state can be read through HotState fundamental helpers.
  - Candidate actual-load feeds are not made default or silently promoted.
required_tests:
  - .venv/bin/pytest tests/test_power_system_state.py tests/test_pjm_fundamentals_semantic_core.py
  - .venv/bin/pytest
