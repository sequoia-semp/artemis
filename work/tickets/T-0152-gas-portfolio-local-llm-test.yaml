problem: >
  Artemis needs a deterministic natural gas portfolio through-time fixture and
  query surface that can support a first local LLM user test over positions,
  Greeks, and PnL without making the LLM authoritative for calculations.
tasks:
  - Add a synthetic, labeled Henry Hub gas portfolio sample with futures and PHE options through time.
  - Build deterministic valuation, Greeks, and PnL reports for the sample portfolio.
  - Add a read/query interface for common analyst questions over the report.
  - Register the gas portfolio build/query commands as deterministic analyst-safe tools.
  - Document the local LLM user test flow and non-authority boundary.
acceptance_criteria:
  - The sample report contains multiple as-of dates, futures positions, option positions, linear PnL, option PnL, total PnL, and grouping metadata.
  - The query interface answers total PnL, date-specific position, book PnL, and Greek questions from report facts only.
  - Unsupported questions return a structured unsupported response instead of invented analytics.
  - Tool registry validation accepts the new commands and labels them deterministic services.
  - Tests cover report generation, CLI output, query behavior, and unsupported-question fail-closed behavior.
required_tests:
  - .venv/bin/python -m pytest tests/test_gas_portfolio.py -q
  - .venv/bin/python -m pytest tests/golden tests/test_price_instrument_spine.py -q
