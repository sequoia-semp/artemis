problem: >
  The first gas portfolio user test needs a formal anti-corruption port layer
  for pricing/risk engines and a runnable local LLM harness that narrates
  deterministic portfolio query outputs without becoming authoritative.
tasks:
  - Add PricingPort and RiskPort protocols with built-in deterministic adapters.
  - Route the gas portfolio option valuation through the built-in pricing port.
  - Add a local LLM portfolio Q&A harness over gas_portfolio_query outputs.
  - Support deterministic dry-run mode for CI and optional OpenAI-compatible local model calls for user testing.
  - Register and document the local LLM test command.
acceptance_criteria:
  - Built-in pricing/risk ports reproduce existing Black-76 Greeks and historical VaR behavior.
  - Gas portfolio report lineage identifies the built-in pricing port implementation.
  - Local LLM harness first calls the deterministic gas portfolio query tool and only then generates narration.
  - Dry-run mode produces an LLM-shaped response with model_calls false and deterministic tool facts.
  - Unsupported portfolio questions remain unsupported and are not narrated as facts.
