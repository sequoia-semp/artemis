problem: >
  Open-source pricing/risk engines should plug into Artemis through optional
  adapters behind the valuation ports, but unavailable or unvalidated adapters
  must not silently affect deterministic analytics.
tasks:
  - Add an OSS adapter catalog for optional pricing and risk engine candidates.
  - Expose adapter availability through a deterministic CLI/tool command.
  - Add fail-closed candidate adapter classes for optional OSS engines until oracle validation promotes them.
  - Document the intake rules for adding QuantLib/Riskfolio-style adapters.
acceptance_criteria:
  - Built-in pricing and risk ports are always reported available.
  - Optional OSS packages are reported as available/unavailable without importing them eagerly.
  - Requesting an unimplemented optional OSS adapter fails closed with a structured exception.
  - Tool registry validation accepts the adapter availability command.
