problem: >
  Gas portfolio facts and daily risk metrics should be materialized into cached
  risk packs with transparent definitions and query indexes instead of being
  recalculated for every analyst or local LLM question.
tasks:
  - Add a Gas Risk Pack artifact builder with manifest, cache key, and query index.
  - Add deterministic exposure buckets, historical VaR/expected shortfall, stress scenarios, and option PnL explain.
  - Add query support for exposure, risk, stress, option explain, cache/lineage, and strategy semantics.
  - Add local LLM Q&A over cached risk pack tool responses.
  - Document strategy/structure labels as candidate advisory semantics requiring human review before promotion.
acceptance_criteria:
  - Building the same risk pack twice reuses the cached artifact unless force rebuild is requested.
  - Risk pack metrics are materialized into a daily JSON artifact and referenced by query index.
  - XH/JV and month-code periods are treated as existing locked period grammar; structures such as straddle, costless collar, 25d RR, and breakeven remain reporting labels unless human-approved.
  - Supported risk questions answer from cached pack facts only.
  - Unsupported or unapproved semantics fail closed instead of becoming conventions.
