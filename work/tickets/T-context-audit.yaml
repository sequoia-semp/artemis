problem: >
  Context, prompt, tool, skill, and wrapper surfaces can drift without a single
  machine-readable audit that strict validation can enforce.
tasks:
  - Implement artemis context audit with JSON output.
  - Scan active prompt, document, tool, skill, command, and wrapper surfaces for stale canonical paths, missing references, legacy compatibility commands, and unregistered tool IDs.
  - Emit severity, code, surface, file path, finding message, and remediation hint for each finding.
  - Add context audit into artemis validate --strict.
  - Keep archive docs out of active-failure scope unless they are referenced by active prompts or canonical docs.
acceptance_criteria:
  - artemis context audit emits machine-readable findings and exits nonzero for blocker findings.
  - artemis validate --strict includes context audit results.
  - Missing default tools, missing active doc references, stale build-packet references, and active pga work-context wrapper usage are detectable.
  - Audit output distinguishes active surfaces from docs/archive historical records.
required_tests:
  - python -m pytest tests/test_native_validation_runner.py tests/test_cli_validation_commands.py tests/test_governance_files.py -q
  - artemis context audit --json
  - artemis validate --strict --ticket T-context-audit
