id: T-context-profiles
type: ticket
status: validated
title: Development context profiles
owner: user
risk: medium
created_at: "2026-06-05"
updated_at: "2026-06-05"
epic: E-0001
sprint: S-002
layer:
  - config
  - agent_runtime
  - docs
  - tests
branch: codex/context-profiles
context_profile: wrapper
problem: >
  Artemis development context currently loads primary files and ticket affected
  files, but it does not expose explicit domain-heavy context profiles for
  trading, behavioral, registry, schema, or wrapper work.
tasks:
  - Add context profile definitions to artemis.yaml.
  - Extend collect_development_context to honor a ticket context_profile field when present.
  - Include canonical domain files for behavioral and trading profiles without hardcoding domain logic in wrappers.
  - Validate unknown context profiles fail closed.
  - Keep default context behavior backward compatible for existing tickets.
acceptance_criteria:
  - A ticket can request a context_profile and artemis dev context loads the configured files.
  - Unknown context profiles fail closed with a clear error.
  - Trading/domain-heavy profiles include locked conventions, source policy, market index model, period grammar, units, schemas, registries, and relevant tests.
  - Existing tickets without context_profile keep the current context bundle shape.
required_tests:
  - python -m pytest tests/test_development_mode.py tests/test_artemis_config.py -q
  - artemis dev context --ticket T-context-profiles --json
affected_files:
  - artemis.yaml
  - schemas/artemis_config.schema.json
  - schemas/ticket.schema.json
  - src/pga_workbench/dev/patch_context.py
  - tests/test_development_mode.py
  - tests/test_artemis_config.py
  - docs/developer/native_workflow.md
change_request_required: true
implemented_at: "2026-06-05T00:00:00Z"
implementation_summary: >
  Added configured context profiles and ticket context_profile support for
  Artemis development context generation.
validated_at: "2026-06-05T00:00:00Z"
validation_report: development/validation_reports/T-context-profiles/latest.json
regression_report: development/regression_reports/REGRESSION_REPORT_T-context-profiles.md
