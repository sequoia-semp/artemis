id: T-context-tool-integrity
type: ticket
status: validated
title: Context and tool integrity
owner: user
risk: high
created_at: "2026-06-05"
updated_at: "2026-06-05"
epic: E-0001
sprint: S-002
layer:
  - config
  - registry
  - validation
  - tests
branch: codex/context-tool-integrity
context_profile: wrapper
problem: >
  Artemis mode defaults can reference tool IDs that are not present in
  registries/tools.yaml. That lets prompt and harness configuration drift away
  from the deterministic tool registry and weakens mode/permission enforcement.
tasks:
  - Extend Artemis config validation so every modes.*.default_tools entry exists in registries/tools.yaml.
  - Validate that each default tool is allowed in the declaring mode.
  - Decide whether validate_repo should be registered as a canonical alias or removed from development defaults.
  - Decide whether kb_search and skill_run should be registered, replaced with existing canonical commands, or removed from analyst defaults.
  - Add failing fixtures or tests for missing default tool IDs and mode-incompatible default tools.
acceptance_criteria:
  - artemis config validate fails closed when any default tool is missing from the registry.
  - artemis config validate fails closed when a default tool is registered but not allowed for the mode that declares it.
  - artemis.yaml and registries/tools.yaml agree for analyst and development defaults.
  - The resulting tool set preserves the rule that prompt-only analytics are candidate-only and deterministic services remain authoritative.
required_tests:
  - python -m pytest tests/test_artemis_config.py tests/test_tool_permissions.py -q
  - artemis config validate
affected_files:
  - artemis.yaml
  - registries/tools.yaml
  - src/pga_workbench/agent/runtime.py
  - src/pga_workbench/tools/registry.py
  - tests/test_artemis_config.py
  - tests/test_tool_permissions.py
change_request_required: true
implemented_at: "2026-06-05T00:00:00Z"
implementation_summary: >
  Artemis config validation now fails closed for missing or mode-incompatible
  default tools; registries/tools.yaml includes validate_repo and ToolSpec v2
  metadata for registered tools.
validated_at: "2026-06-05T00:00:00Z"
