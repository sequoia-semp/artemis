problem: >
  Skill surfaces are split between canonical YAML analyst skill manifests,
  markdown procedural skills, and .agents/skills shims. Validation does not yet
  make authority and manifest coverage explicit across those surfaces.
tasks:
  - Add a procedural skill manifest or equivalent index for markdown procedural skills.
  - Validate that procedural skills declare authority, deterministic dependencies, inputs, outputs, and tests when they affect analytics.
  - Validate .agents/skills shims point to canonical manifests or procedural skill records.
  - Keep YAML analyst skills validated against schemas/skill.schema.json.
  - Add audit findings for unmanifested active skill surfaces.
acceptance_criteria:
  - artemis skill validate covers YAML analyst skills and procedural markdown skills.
  - Unmanifested active procedural skills produce validation findings.
  - Skills that affect analytics identify deterministic code/tests and cannot claim prompt-only authority.
  - .agents/skills shims are traceable to canonical skill records.
required_tests:
  - python -m pytest tests/test_skill_view_manifests.py tests/test_artemis_cli.py -q
  - artemis skill validate
affected_files:
  - skills/manifest.yaml
  - schemas/skill.schema.json
  - src/pga_workbench/skills/validator.py
  - src/pga_workbench/cli.py
  - .agents/skills/
  - .agents/skills/spread-basis-decomposition/SKILL.md
  - tests/test_skill_view_manifests.py
  - tests/test_artemis_cli.py
